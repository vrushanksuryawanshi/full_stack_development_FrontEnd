<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Layout Builder</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f0f0f5;display:flex;padding:20px;gap:20px;min-height:100vh}
@media(max-width:768px){body{flex-direction:column}}
.controls{width:300px;background:#16162a;padding:20px;border-radius:16px;border:1px solid rgba(255,255,255,0.05)}
h1{font-size:20px;margin-bottom:20px;color:#00b894}
.control-group{margin-bottom:15px}
.control-group label{display:block;color:#a0a0b8;font-size:12px;font-weight:bold;margin-bottom:8px;text-transform:uppercase}
input[type="text"], input[type="number"]{width:100%;background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);color:#fff;padding:10px;border-radius:8px;outline:none}
.btn{width:100%;padding:10px;background:#00b894;color:#1a1a2e;border:none;border-radius:8px;cursor:pointer;margin-top:10px;font-weight:bold}
.btn:hover{background:#00a383}
.preview-wrapper{flex:1;background:#12121a;border-radius:16px;padding:20px;display:flex;flex-direction:column}
.preview{flex:1;display:grid;background:#1a1a2e;border:1px dashed #00b894;transition:all 0.3s;min-height:300px}
.item{background:linear-gradient(135deg,#00b894,#55efc4);color:#1a1a2e;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:20px;border-radius:4px;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.1)}
.code-panel{background:#0a0a0f;padding:15px;border-radius:12px;margin-top:20px;font-family:monospace;font-size:13px;color:#55efc4;border:1px solid rgba(255,255,255,0.05);white-space:pre-wrap}
</style>
</head>
<body>
<div class="controls">
    <h1>🏗️ CSS Grid Builder</h1>
    
    <div class="control-group">
        <label>grid-template-columns</label>
        <input type="text" id="cols" value="1fr 1fr 1fr" oninput="updateGrid()" placeholder="e.g. 1fr 2fr 1fr">
    </div>
    
    <div class="control-group">
        <label>grid-template-rows</label>
        <input type="text" id="rows" value="100px 100px" oninput="updateGrid()" placeholder="e.g. 100px auto">
    </div>
    
    <div class="control-group">
        <label>gap (px)</label>
        <input type="number" id="gap" value="10" min="0" max="100" oninput="updateGrid()">
    </div>

    <hr style="border:0;border-top:1px solid rgba(255,255,255,0.1);margin:20px 0">
    
    <div class="control-group">
        <label>Number of Items</label>
        <input type="number" id="itemsCount" value="6" min="1" max="50" oninput="generateItems()">
    </div>
</div>

<div class="preview-wrapper">
    <div class="preview" id="preview"></div>
    <div class="code-panel" id="codePanel"></div>
</div>

<script>
const preview = document.getElementById('preview');
const codePanel = document.getElementById('codePanel');
const colsInp = document.getElementById('cols');
const rowsInp = document.getElementById('rows');
const gapInp = document.getElementById('gap');
const itemsCountInp = document.getElementById('itemsCount');

function generateItems() {
    const count = parseInt(itemsCountInp.value) || 1;
    preview.innerHTML = '';
    for(let i=1; i<=count; i++) {
        const div = document.createElement('div');
        div.className = 'item';
        div.textContent = i;
        preview.appendChild(div);
    }
}

function updateGrid() {
    const cols = colsInp.value || '1fr';
    const rows = rowsInp.value || 'auto';
    const gap = gapInp.value + 'px';

    preview.style.gridTemplateColumns = cols;
    preview.style.gridTemplateRows = rows;
    preview.style.gap = gap;

    codePanel.textContent = `.grid-container {
  display: grid;
  grid-template-columns: ${cols};
  grid-template-rows: ${rows};
  gap: ${gap};
}`;
}

generateItems();
updateGrid();
</script>
</body>
</html>
