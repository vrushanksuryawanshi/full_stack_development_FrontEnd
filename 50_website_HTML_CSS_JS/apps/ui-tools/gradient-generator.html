<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Gradient Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f0f0f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
.container{background:#16162a;padding:40px;border-radius:24px;width:100%;max-width:500px;box-shadow:0 15px 35px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.05)}
h1{margin-bottom:30px;text-align:center;background:linear-gradient(135deg,#fd79a8,#e84393);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.preview-box{width:100%;height:200px;border-radius:16px;background:linear-gradient(90deg, #fd79a8, #6c5ce7);margin-bottom:30px;box-shadow:0 10px 20px rgba(0,0,0,0.3);transition:background 0.1s}
.controls{display:flex;flex-direction:column;gap:20px;margin-bottom:30px}
.control-group{display:flex;align-items:center;justify-content:space-between;background:#1a1a2e;padding:15px;border-radius:12px;border:1px solid rgba(255,255,255,0.05)}
.control-group label{font-weight:bold;color:#a0a0b8}
input[type="color"]{width:50px;height:40px;border:none;border-radius:8px;background:none;cursor:pointer}
input[type="color"]::-webkit-color-swatch-wrapper{padding:0}
input[type="color"]::-webkit-color-swatch{border:none;border-radius:8px}
select, input[type="range"]{background:#12121a;border:1px solid rgba(255,255,255,0.1);color:#fff;padding:8px;border-radius:8px;outline:none;font-family:inherit}
.output-box{background:#12121a;padding:15px;border-radius:12px;border:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center}
code{font-family:monospace;color:#55efc4;font-size:14px;word-break:break-all}
.copy-btn{background:#6c5ce7;color:#fff;border:none;padding:8px 15px;border-radius:8px;cursor:pointer;font-weight:bold;transition:background 0.2s}
.copy-btn:hover{background:#5a4bcf}
.random-btn{width:100%;padding:15px;background:#2a2a3e;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:20px;transition:background 0.2s}
.random-btn:hover{background:#3a3a4e}
</style>
</head>
<body>
<div class="container">
    <h1>🌈 Gradient Generator</h1>
    
    <div class="preview-box" id="previewBox"></div>
    
    <button class="random-btn" onclick="randomGradient()">Randomize</button>
    
    <div class="controls">
        <div class="control-group">
            <label>Color 1</label>
            <input type="color" id="color1" value="#fd79a8" oninput="generate()">
        </div>
        <div class="control-group">
            <label>Color 2</label>
            <input type="color" id="color2" value="#6c5ce7" oninput="generate()">
        </div>
        <div class="control-group">
            <label>Direction</label>
            <select id="direction" onchange="generate()">
                <option value="to right">Right ➔</option>
                <option value="to left">Left ⬅</option>
                <option value="to bottom">Bottom ⬇</option>
                <option value="to top">Top ⬆</option>
                <option value="to bottom right">Bottom Right ↘</option>
                <option value="to bottom left">Bottom Left ↙</option>
                <option value="to top right">Top Right ↗</option>
                <option value="to top left">Top Left ↖</option>
                <option value="circle">Radial (Circle)</option>
            </select>
        </div>
    </div>
    
    <div class="output-box">
        <code id="cssCode">background: linear-gradient(to right, #fd79a8, #6c5ce7);</code>
        <button class="copy-btn" id="copyBtn" onclick="copyCSS()">Copy</button>
    </div>
</div>

<script>
const color1 = document.getElementById('color1');
const color2 = document.getElementById('color2');
const direction = document.getElementById('direction');
const previewBox = document.getElementById('previewBox');
const cssCode = document.getElementById('cssCode');
const copyBtn = document.getElementById('copyBtn');

function generate() {
    const c1 = color1.value;
    const c2 = color2.value;
    const dir = direction.value;
    
    let grad = '';
    if(dir === 'circle') {
        grad = `radial-gradient(${dir}, ${c1}, ${c2})`;
    } else {
        grad = `linear-gradient(${dir}, ${c1}, ${c2})`;
    }
    
    previewBox.style.background = grad;
    cssCode.textContent = `background: ${grad};`;
}

function randomColor() {
    return '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
}

function randomGradient() {
    color1.value = randomColor();
    color2.value = randomColor();
    // randomly pick direction
    const opts = direction.options;
    direction.selectedIndex = Math.floor(Math.random() * opts.length);
    generate();
}

function copyCSS() {
    navigator.clipboard.writeText(cssCode.textContent);
    copyBtn.textContent = 'Copied!';
    copyBtn.style.background = '#00b894';
    setTimeout(() => {
        copyBtn.textContent = 'Copy';
        copyBtn.style.background = '#6c5ce7';
    }, 1500);
}

// init
generate();
</script>
</body>
</html>
