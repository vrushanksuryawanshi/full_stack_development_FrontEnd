<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Box Shadow Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f0f0f5;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.container{background:#16162a;padding:30px;border-radius:24px;width:100%;max-width:800px;box-shadow:0 15px 35px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.05);display:flex;gap:30px;flex-wrap:wrap}
@media(max-width:768px){.container{flex-direction:column}}
h1{margin-bottom:20px;background:linear-gradient(135deg,#74b9ff,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;width:100%;text-align:center}
.preview-section{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;background:#12121a;border-radius:16px;border:1px solid rgba(255,255,255,0.05)}
.box{width:200px;height:200px;background:#1a1a2e;border-radius:16px;transition:box-shadow 0.1s}
.controls-section{flex:1;display:flex;flex-direction:column;gap:15px}
.control-group{display:flex;flex-direction:column;gap:8px}
.control-header{display:flex;justify-content:space-between;color:#a0a0b8;font-size:14px;font-weight:bold}
input[type="range"]{width:100%;accent-color:#74b9ff;height:6px;background:#1a1a2e;border-radius:3px;outline:none;appearance:none}
input[type="range"]::-webkit-slider-thumb{appearance:none;width:16px;height:16px;background:#74b9ff;border-radius:50%;cursor:pointer}
.color-picker{display:flex;align-items:center;gap:10px;background:#1a1a2e;padding:10px;border-radius:12px}
input[type="color"]{border:none;background:none;width:30px;height:30px;cursor:pointer}
input[type="color"]::-webkit-color-swatch-wrapper{padding:0}
input[type="color"]::-webkit-color-swatch{border:none;border-radius:6px}
.checkbox-group{display:flex;align-items:center;gap:10px;color:#a0a0b8;font-size:14px;font-weight:bold;margin-top:10px}
input[type="checkbox"]{width:18px;height:18px;accent-color:#74b9ff}
.output-box{width:100%;background:#12121a;padding:15px;border-radius:12px;border:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center;margin-top:10px}
code{font-family:monospace;color:#55efc4;font-size:14px;word-break:break-all}
.copy-btn{background:#74b9ff;color:#1a1a2e;border:none;padding:8px 15px;border-radius:8px;cursor:pointer;font-weight:bold;transition:background 0.2s}
.copy-btn:hover{background:#5499df}
</style>
</head>
<body>
<div class="container">
    <h1>🖼️ Box Shadow Generator</h1>
    
    <div class="preview-section">
        <div class="box" id="box"></div>
    </div>
    
    <div class="controls-section">
        <div class="control-group">
            <div class="control-header"><span>Horizontal Offset</span> <span id="hxVal">0px</span></div>
            <input type="range" id="hx" min="-100" max="100" value="0" oninput="updateShadow()">
        </div>
        <div class="control-group">
            <div class="control-header"><span>Vertical Offset</span> <span id="vyVal">15px</span></div>
            <input type="range" id="vy" min="-100" max="100" value="15" oninput="updateShadow()">
        </div>
        <div class="control-group">
            <div class="control-header"><span>Blur Radius</span> <span id="blurVal">35px</span></div>
            <input type="range" id="blur" min="0" max="100" value="35" oninput="updateShadow()">
        </div>
        <div class="control-group">
            <div class="control-header"><span>Spread Radius</span> <span id="spreadVal">0px</span></div>
            <input type="range" id="spread" min="-50" max="50" value="0" oninput="updateShadow()">
        </div>
        
        <div class="color-picker">
            <input type="color" id="shadowColor" value="#000000" oninput="updateShadow()">
            <div class="control-header" style="flex:1"><span>Opacity</span> <span id="opacityVal">0.5</span></div>
            <input type="range" id="opacity" min="0" max="1" step="0.05" value="0.5" oninput="updateShadow()" style="width:100px">
        </div>
        
        <div class="checkbox-group">
            <input type="checkbox" id="inset" onchange="updateShadow()">
            <label for="inset">Inset Shadow</label>
        </div>
        
        <div class="output-box">
            <code id="cssCode">box-shadow: 0px 15px 35px 0px rgba(0, 0, 0, 0.5);</code>
            <button class="copy-btn" id="copyBtn" onclick="copyCSS()">Copy</button>
        </div>
    </div>
</div>

<script>
const box = document.getElementById('box');
const cssCode = document.getElementById('cssCode');
const hx = document.getElementById('hx');
const vy = document.getElementById('vy');
const blur = document.getElementById('blur');
const spread = document.getElementById('spread');
const color = document.getElementById('shadowColor');
const opacity = document.getElementById('opacity');
const inset = document.getElementById('inset');

function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function updateShadow() {
    document.getElementById('hxVal').textContent = `${hx.value}px`;
    document.getElementById('vyVal').textContent = `${vy.value}px`;
    document.getElementById('blurVal').textContent = `${blur.value}px`;
    document.getElementById('spreadVal').textContent = `${spread.value}px`;
    document.getElementById('opacityVal').textContent = opacity.value;
    
    const rgbaColor = hexToRgba(color.value, opacity.value);
    const insetString = inset.checked ? 'inset ' : '';
    const shadowString = `${insetString}${hx.value}px ${vy.value}px ${blur.value}px ${spread.value}px ${rgbaColor}`;
    
    box.style.boxShadow = shadowString;
    cssCode.textContent = `box-shadow: ${shadowString};`;
}

function copyCSS() {
    navigator.clipboard.writeText(cssCode.textContent);
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
}

updateShadow();
</script>
</body>
</html>
