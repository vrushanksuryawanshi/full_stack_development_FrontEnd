<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexbox Visualizer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f0f0f5;display:flex;padding:20px;gap:20px;min-height:100vh}
@media(max-width:768px){body{flex-direction:column}}
.controls{width:300px;background:#16162a;padding:20px;border-radius:16px;border:1px solid rgba(255,255,255,0.05);overflow-y:auto}
h1{font-size:20px;margin-bottom:20px;color:#a29bfe}
.control-group{margin-bottom:15px}
.control-group label{display:block;color:#a0a0b8;font-size:12px;font-weight:bold;margin-bottom:8px;text-transform:uppercase}
select, input[type="number"]{width:100%;background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);color:#fff;padding:10px;border-radius:8px;outline:none}
.btn{width:100%;padding:10px;background:#6c5ce7;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-top:10px;font-weight:bold}
.btn:hover{background:#5a4bcf}
.preview{flex:1;background:#12121a;border:1px dashed #6c5ce7;border-radius:16px;display:flex;padding:10px;min-height:400px;transition:all 0.3s}
.item{background:linear-gradient(135deg,#fd79a8,#e84393);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:24px;border-radius:8px;min-width:60px;min-height:60px;margin:5px;transition:all 0.3s;box-shadow:0 4px 10px rgba(0,0,0,0.3)}
.code-panel{background:#0a0a0f;padding:15px;border-radius:12px;margin-top:20px;font-family:monospace;font-size:13px;color:#55efc4;border:1px solid rgba(255,255,255,0.05);white-space:pre-wrap}
</style>
</head>
<body>
<div class="controls">
    <h1>📦 Flexbox Visualizer</h1>
    
    <div class="control-group">
        <label>flex-direction</label>
        <select id="flexDirection" onchange="updateFlex()">
            <option value="row">row</option>
            <option value="row-reverse">row-reverse</option>
            <option value="column">column</option>
            <option value="column-reverse">column-reverse</option>
        </select>
    </div>
    
    <div class="control-group">
        <label>justify-content</label>
        <select id="justifyContent" onchange="updateFlex()">
            <option value="flex-start">flex-start</option>
            <option value="flex-end">flex-end</option>
            <option value="center">center</option>
            <option value="space-between">space-between</option>
            <option value="space-around">space-around</option>
            <option value="space-evenly">space-evenly</option>
        </select>
    </div>
    
    <div class="control-group">
        <label>align-items</label>
        <select id="alignItems" onchange="updateFlex()">
            <option value="stretch">stretch</option>
            <option value="flex-start">flex-start</option>
            <option value="flex-end">flex-end</option>
            <option value="center">center</option>
            <option value="baseline">baseline</option>
        </select>
    </div>
    
    <div class="control-group">
        <label>flex-wrap</label>
        <select id="flexWrap" onchange="updateFlex()">
            <option value="nowrap">nowrap</option>
            <option value="wrap">wrap</option>
            <option value="wrap-reverse">wrap-reverse</option>
        </select>
    </div>
    
    <div class="control-group">
        <label>gap (px)</label>
        <input type="number" id="gap" value="10" min="0" max="100" oninput="updateFlex()">
    </div>

    <hr style="border:0;border-top:1px solid rgba(255,255,255,0.1);margin:20px 0">
    
    <button class="btn" onclick="addItem()">+ Add Item</button>
    <button class="btn" onclick="removeItem()" style="background:#ff7675">- Remove Item</button>
    
    <div class="code-panel" id="codePanel"></div>
</div>

<div class="preview" id="preview">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
</div>

<script>
const preview = document.getElementById('preview');
const codePanel = document.getElementById('codePanel');
let itemCount = 3;

function updateFlex() {
    const fd = document.getElementById('flexDirection').value;
    const jc = document.getElementById('justifyContent').value;
    const ai = document.getElementById('alignItems').value;
    const fw = document.getElementById('flexWrap').value;
    const gp = document.getElementById('gap').value + 'px';

    preview.style.flexDirection = fd;
    preview.style.justifyContent = jc;
    preview.style.alignItems = ai;
    preview.style.flexWrap = fw;
    preview.style.gap = gp;

    codePanel.textContent = `.container {
  display: flex;
  flex-direction: ${fd};
  justify-content: ${jc};
  align-items: ${ai};
  flex-wrap: ${fw};
  gap: ${gp};
}`;
}

function addItem() {
    if(itemCount >= 20) return;
    itemCount++;
    const div = document.createElement('div');
    div.className = 'item';
    div.textContent = itemCount;
    preview.appendChild(div);
}

function removeItem() {
    if(itemCount <= 1) return;
    preview.removeChild(preview.lastChild);
    itemCount--;
}

updateFlex();
</script>
</body>
</html>
