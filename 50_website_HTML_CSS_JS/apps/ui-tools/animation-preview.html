<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animation Preview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f0f0f5;display:flex;padding:20px;gap:20px;min-height:100vh}
@media(max-width:768px){body{flex-direction:column}}
.controls{width:300px;background:#16162a;padding:20px;border-radius:16px;border:1px solid rgba(255,255,255,0.05)}
h1{font-size:20px;margin-bottom:20px;color:#a29bfe}
.control-group{margin-bottom:15px}
.control-group label{display:block;color:#a0a0b8;font-size:12px;font-weight:bold;margin-bottom:8px;text-transform:uppercase}
select, input[type="range"]{width:100%;background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);color:#fff;padding:10px;border-radius:8px;outline:none}
input[type="range"]{height:6px;padding:0;appearance:none;accent-color:#a29bfe}
input[type="range"]::-webkit-slider-thumb{appearance:none;width:16px;height:16px;background:#a29bfe;border-radius:50%;cursor:pointer}
.val-display{float:right;color:#a29bfe}
.btn{width:100%;padding:12px;background:#6c5ce7;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-top:10px;font-weight:bold;font-size:16px}
.btn:hover{background:#5a4bcf}
.preview-wrapper{flex:1;background:#12121a;border-radius:16px;padding:20px;display:flex;flex-direction:column}
.preview{flex:1;display:flex;align-items:center;justify-content:center;background:#1a1a2e;border-radius:12px;border:1px solid rgba(255,255,255,0.05);min-height:300px;overflow:hidden}
.anim-box{width:100px;height:100px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);border-radius:16px;box-shadow:0 10px 20px rgba(0,0,0,0.3)}
.code-panel{background:#0a0a0f;padding:15px;border-radius:12px;margin-top:20px;font-family:monospace;font-size:13px;color:#55efc4;border:1px solid rgba(255,255,255,0.05);white-space:pre-wrap}

/* predefined keyframes */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes bounce{0%,20%,50%,80%,100%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-15px)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes wobble{0%{transform:translateX(0)}15%{transform:translateX(-25%) rotate(-5deg)}30%{transform:translateX(20%) rotate(3deg)}45%{transform:translateX(-15%) rotate(-3deg)}60%{transform:translateX(10%) rotate(2deg)}75%{transform:translateX(-5%) rotate(-1deg)}100%{transform:translateX(0)}}
</style>
</head>
<body>
<div class="controls">
    <h1>🎬 Animation Preview</h1>
    
    <div class="control-group">
        <label>Animation Name</label>
        <select id="animName" onchange="updateAnim()">
            <option value="pulse">Pulse</option>
            <option value="fadeIn">Fade In</option>
            <option value="slideUp">Slide Up</option>
            <option value="bounce">Bounce</option>
            <option value="spin">Spin</option>
            <option value="wobble">Wobble</option>
        </select>
    </div>
    
    <div class="control-group">
        <label>Duration <span class="val-display" id="durVal">1s</span></label>
        <input type="range" id="duration" min="0.1" max="5" step="0.1" value="1" oninput="updateAnim()">
    </div>
    
    <div class="control-group">
        <label>Timing Function</label>
        <select id="timing" onchange="updateAnim()">
            <option value="ease">ease</option>
            <option value="linear">linear</option>
            <option value="ease-in">ease-in</option>
            <option value="ease-out">ease-out</option>
            <option value="ease-in-out">ease-in-out</option>
        </select>
    </div>

    <div class="control-group">
        <label>Iteration Count</label>
        <select id="iteration" onchange="updateAnim()">
            <option value="infinite">infinite</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
        </select>
    </div>

    <button class="btn" onclick="replayAnim()">Replay</button>
</div>

<div class="preview-wrapper">
    <div class="preview">
        <div class="anim-box" id="box"></div>
    </div>
    <div class="code-panel" id="codePanel"></div>
</div>

<script>
const box = document.getElementById('box');
const codePanel = document.getElementById('codePanel');

function updateAnim() {
    const name = document.getElementById('animName').value;
    const dur = document.getElementById('duration').value + 's';
    const timing = document.getElementById('timing').value;
    const iter = document.getElementById('iteration').value;

    document.getElementById('durVal').textContent = dur;

    const animStr = `${name} ${dur} ${timing} ${iter}`;
    box.style.animation = 'none';
    
    // trigger reflow
    void box.offsetWidth;
    
    box.style.animation = animStr;

    codePanel.textContent = `.animated-element {
  animation: ${animStr};
}`;
}

function replayAnim() {
    const current = box.style.animation;
    box.style.animation = 'none';
    void box.offsetWidth;
    box.style.animation = current;
}

updateAnim();
</script>
</body>
</html>
