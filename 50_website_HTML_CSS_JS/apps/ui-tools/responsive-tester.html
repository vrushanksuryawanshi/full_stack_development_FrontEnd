<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Tester</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f0f0f5;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{padding:15px 20px;background:#16162a;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center}
h1{font-size:18px;color:#00b894}
.devices{display:flex;gap:10px}
.device-btn{padding:8px 16px;background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);color:#a0a0b8;border-radius:8px;cursor:pointer;font-weight:bold;transition:all 0.2s}
.device-btn.active{background:#00b894;color:#1a1a2e;border-color:#00b894}
.url-bar{display:flex;gap:10px;margin-left:20px;flex:1;max-width:400px}
.url-bar input{flex:1;padding:8px 15px;background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);color:#fff;border-radius:8px;outline:none}
.url-bar button{padding:8px 15px;background:#2a2a3e;border:none;color:#fff;border-radius:8px;cursor:pointer}
.main{flex:1;display:flex;align-items:center;justify-content:center;background:#0a0a0f;overflow:auto;padding:20px}
.frame-wrapper{transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);border:10px solid #1a1a2e;border-radius:24px;overflow:hidden;background:#fff;box-shadow:0 20px 50px rgba(0,0,0,0.5);position:relative}
.frame-wrapper::before{content:'';position:absolute;top:5px;left:50%;transform:translateX(-50%);width:60px;height:6px;background:#0a0a0f;border-radius:3px;z-index:10}
iframe{width:100%;height:100%;border:none;background:#fff}
.info{text-align:center;color:#a0a0b8;margin-top:10px;font-size:14px}
</style>
</head>
<body>
<div class="header">
    <h1>📱 Responsive Tester</h1>
    <div class="url-bar">
        <input type="text" id="urlInput" value="https://example.com" placeholder="Enter URL starting with https://">
        <button onclick="loadUrl()">Go</button>
    </div>
    <div class="devices">
        <button class="device-btn" onclick="setDevice('mobile', 375, 812)">Mobile</button>
        <button class="device-btn" onclick="setDevice('tablet', 768, 1024)">Tablet</button>
        <button class="device-btn" onclick="setDevice('laptop', 1280, 800)">Laptop</button>
        <button class="device-btn active" onclick="setDevice('desktop', 1440, 900)">Desktop</button>
    </div>
</div>

<div class="main">
    <div style="display:flex;flex-direction:column;align-items:center">
        <div class="frame-wrapper" id="frameWrapper" style="width:1440px;height:900px">
            <iframe id="previewFrame" src="https://example.com" sandbox="allow-same-origin allow-scripts"></iframe>
        </div>
        <div class="info" id="sizeInfo">Desktop: 1440 x 900</div>
    </div>
</div>

<script>
const frameWrapper = document.getElementById('frameWrapper');
const sizeInfo = document.getElementById('sizeInfo');
const urlInput = document.getElementById('urlInput');
const previewFrame = document.getElementById('previewFrame');
const btns = document.querySelectorAll('.device-btn');

function setDevice(name, w, h) {
    // Reset buttons
    btns.forEach(b => {
        if(b.textContent.toLowerCase() === name) b.classList.add('active');
        else b.classList.remove('active');
    });

    // Scale down if viewport is too small to show full size
    const scale = Math.min(
        1, 
        (window.innerWidth - 60) / w, 
        (window.innerHeight - 150) / h
    );

    frameWrapper.style.width = w + 'px';
    frameWrapper.style.height = h + 'px';
    frameWrapper.style.transform = `scale(${scale})`;
    
    sizeInfo.textContent = `${name.charAt(0).toUpperCase() + name.slice(1)}: ${w} x ${h} (Scale: ${Math.round(scale*100)}%)`;
}

function loadUrl() {
    let url = urlInput.value.trim();
    if(!url) return;
    if(!url.startsWith('http')) url = 'https://' + url;
    previewFrame.src = url;
}

urlInput.addEventListener('keypress', e => { if(e.key === 'Enter') loadUrl(); });

// Adjust scale on window resize
window.addEventListener('resize', () => {
    const activeBtn = document.querySelector('.device-btn.active');
    if(activeBtn) activeBtn.click();
});

// Initial trigger to set scale correctly based on window
setTimeout(() => setDevice('desktop', 1440, 900), 100);
</script>
</body>
</html>
