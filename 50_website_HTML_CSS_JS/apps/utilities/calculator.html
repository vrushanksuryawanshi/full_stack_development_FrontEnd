<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;display:flex;align-items:center;justify-content:center;min-height:100vh}
.calculator{background:#16162a;padding:25px;border-radius:24px;box-shadow:0 15px 40px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.05);width:320px}
.display{background:#0e0e18;padding:20px;border-radius:12px;margin-bottom:20px;text-align:right;border:1px solid rgba(255,255,255,0.05)}
.previous{color:#a0a0b8;font-size:14px;min-height:20px}
.current{color:#fff;font-size:36px;font-weight:bold;margin-top:5px;word-wrap:break-word}
.buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
button{padding:18px 0;border:none;background:#1a1a2e;color:#f0f0f5;font-size:20px;font-weight:bold;border-radius:12px;cursor:pointer;transition:all 0.1s}
button:hover{background:#2a2a3e}
button:active{transform:scale(0.95)}
.operator{background:#6c5ce7;color:#fff}
.operator:hover{background:#5a4bcf}
.action{background:#ff7675;color:#fff}
.action:hover{background:#e86464}
.equal{grid-column:span 2;background:#00b894;color:#fff}
.equal:hover{background:#00a383}
</style>
</head>
<body>
<div class="calculator">
    <div class="display">
        <div class="previous" id="prevDisplay"></div>
        <div class="current" id="currDisplay">0</div>
    </div>
    <div class="buttons">
        <button class="action" onclick="clearDisplay()">AC</button>
        <button class="action" onclick="deleteChar()">DEL</button>
        <button class="operator" onclick="appendOp('%')">%</button>
        <button class="operator" onclick="appendOp('/')">÷</button>
        
        <button onclick="appendNum('7')">7</button>
        <button onclick="appendNum('8')">8</button>
        <button onclick="appendNum('9')">9</button>
        <button class="operator" onclick="appendOp('*')">×</button>
        
        <button onclick="appendNum('4')">4</button>
        <button onclick="appendNum('5')">5</button>
        <button onclick="appendNum('6')">6</button>
        <button class="operator" onclick="appendOp('-')">−</button>
        
        <button onclick="appendNum('1')">1</button>
        <button onclick="appendNum('2')">2</button>
        <button onclick="appendNum('3')">3</button>
        <button class="operator" onclick="appendOp('+')">+</button>
        
        <button onclick="appendNum('00')">00</button>
        <button onclick="appendNum('0')">0</button>
        <button onclick="appendNum('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
let current = '0', previous = '', operator = undefined;
const currEl = document.getElementById('currDisplay');
const prevEl = document.getElementById('prevDisplay');

function updateDisplay() {
    currEl.textContent = current;
    prevEl.textContent = previous ? `${previous} ${operator}` : '';
}

function clearDisplay() { current = '0'; previous = ''; operator = undefined; updateDisplay(); }

function deleteChar() {
    if(current === 'Error') current = '0';
    else if(current.length === 1) current = '0';
    else current = current.slice(0, -1);
    updateDisplay();
}

function appendNum(num) {
    if(current === '0' && num !== '.') current = num;
    else if(current === 'Error') current = num;
    else {
        if(num === '.' && current.includes('.')) return;
        current += num;
    }
    updateDisplay();
}

function appendOp(op) {
    if(current === 'Error') return;
    if(previous !== '') calculate();
    operator = op;
    previous = current;
    current = '0';
    updateDisplay();
}

function calculate() {
    if(previous === '' || current === 'Error') return;
    let res;
    const prev = parseFloat(previous);
    const curr = parseFloat(current);
    if(isNaN(prev) || isNaN(curr)) return;

    switch(operator) {
        case '+': res = prev + curr; break;
        case '-': res = prev - curr; break;
        case '*': res = prev * curr; break;
        case '/': res = curr === 0 ? 'Error' : prev / curr; break;
        case '%': res = prev % curr; break;
        default: return;
    }
    
    current = res === 'Error' ? 'Error' : Math.round(res * 100000000)/100000000;
    operator = undefined;
    previous = '';
    updateDisplay();
}
</script>
</body>
</html>
