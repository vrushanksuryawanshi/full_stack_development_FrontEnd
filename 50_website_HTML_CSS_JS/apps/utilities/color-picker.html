<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Picker Tool</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f0f0f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
.container{background:#16162a;padding:40px;border-radius:24px;width:100%;max-width:400px;box-shadow:0 15px 35px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.05);text-align:center}
h1{margin-bottom:30px;background:linear-gradient(135deg,#fd79a8,#e84393);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.color-display{width:100%;height:150px;border-radius:16px;background:#6c5ce7;margin-bottom:30px;box-shadow:0 10px 20px rgba(0,0,0,0.3);transition:background 0.2s}
input[type="color"]{width:100%;height:50px;border:none;border-radius:12px;background:none;cursor:pointer;margin-bottom:30px}
input[type="color"]::-webkit-color-swatch-wrapper{padding:0}
input[type="color"]::-webkit-color-swatch{border:none;border-radius:12px}
.formats{display:flex;flex-direction:column;gap:15px}
.format-box{display:flex;background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);border-radius:12px;overflow:hidden}
.format-label{width:60px;background:#12121a;padding:15px;font-weight:bold;color:#a0a0b8;border-right:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center}
.format-val{flex:1;padding:15px;font-family:monospace;font-size:16px;color:#fff;text-align:left;display:flex;align-items:center}
.copy-btn{background:none;border:none;border-left:1px solid rgba(255,255,255,0.1);color:#fd79a8;padding:0 20px;cursor:pointer;font-weight:bold;transition:background 0.2s}
.copy-btn:hover{background:rgba(253,121,168,0.1)}
</style>
</head>
<body>
<div class="container">
    <h1>🎨 Color Picker</h1>
    
    <div class="color-display" id="colorDisplay"></div>
    
    <input type="color" id="colorPicker" value="#6c5ce7">
    
    <div class="formats">
        <div class="format-box">
            <div class="format-label">HEX</div>
            <div class="format-val" id="hexVal">#6c5ce7</div>
            <button class="copy-btn" onclick="copy('hexVal')">Copy</button>
        </div>
        <div class="format-box">
            <div class="format-label">RGB</div>
            <div class="format-val" id="rgbVal">rgb(108, 92, 231)</div>
            <button class="copy-btn" onclick="copy('rgbVal')">Copy</button>
        </div>
        <div class="format-box">
            <div class="format-label">HSL</div>
            <div class="format-val" id="hslVal">hsl(247, 74%, 63%)</div>
            <button class="copy-btn" onclick="copy('hslVal')">Copy</button>
        </div>
    </div>
</div>

<script>
const picker = document.getElementById('colorPicker');
const display = document.getElementById('colorDisplay');
const hexEl = document.getElementById('hexVal');
const rgbEl = document.getElementById('rgbVal');
const hslEl = document.getElementById('hslVal');

function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return {r, g, b};
}

function rgbToHsl(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    let h, s, l = (max + min) / 2;

    if(max === min) { h = s = 0; }
    else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch(max) {
            case r: h = (g - b) / d + (g < b ? 6 : 0); break;
            case g: h = (b - r) / d + 2; break;
            case b: h = (r - g) / d + 4; break;
        }
        h /= 6;
    }
    return { h: Math.round(h*360), s: Math.round(s*100), l: Math.round(l*100) };
}

function updateColors() {
    const hex = picker.value;
    display.style.background = hex;
    hexEl.textContent = hex;
    
    const {r, g, b} = hexToRgb(hex);
    rgbEl.textContent = `rgb(${r}, ${g}, ${b})`;
    
    const {h, s, l} = rgbToHsl(r, g, b);
    hslEl.textContent = `hsl(${h}, ${s}%, ${l}%)`;
}

function copy(id) {
    const text = document.getElementById(id).textContent;
    navigator.clipboard.writeText(text);
    
    // Quick feedback
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 1000);
}

picker.addEventListener('input', updateColors);
updateColors();
</script>
</body>
</html>
