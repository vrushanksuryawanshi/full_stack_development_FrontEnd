<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Case Converter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f0f0f5;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.container{background:#16162a;padding:30px;border-radius:24px;width:100%;max-width:800px;box-shadow:0 15px 35px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.05)}
h1{margin-bottom:20px;text-align:center;background:linear-gradient(135deg,#a29bfe,#6c5ce7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
textarea{width:100%;height:200px;background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;font-size:16px;font-family:inherit;padding:20px;outline:none;resize:vertical;margin-bottom:20px;transition:border-color 0.2s}
textarea:focus{border-color:#6c5ce7}
.btn-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));gap:10px;margin-bottom:20px}
button{padding:12px;background:#1a1a2e;color:#a0a0b8;border:1px solid rgba(255,255,255,0.1);border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;transition:all 0.2s}
button:hover{background:#2a2a3e;color:#fff;border-color:rgba(255,255,255,0.2)}
.actions{display:flex;justify-content:space-between;border-top:1px solid rgba(255,255,255,0.05);padding-top:20px}
.actions button{background:#6c5ce7;color:#fff;border:none}
.actions button:hover{background:#5a4bcf;transform:translateY(-2px)}
.actions button.clear{background:transparent;color:#ff7675;border:1px solid rgba(255,118,117,0.3)}
.actions button.clear:hover{background:rgba(255,118,117,0.1)}
.stats{font-size:12px;color:#6a6a80;text-align:right;margin-top:10px}
</style>
</head>
<body>
<div class="container">
    <h1>🔤 Text Case Converter</h1>
    <textarea id="textInput" placeholder="Type or paste your text here..."></textarea>
    
    <div class="btn-grid">
        <button onclick="convert('lower')">lowercase</button>
        <button onclick="convert('upper')">UPPERCASE</button>
        <button onclick="convert('title')">Title Case</button>
        <button onclick="convert('sentence')">Sentence case.</button>
        <button onclick="convert('camel')">camelCase</button>
        <button onclick="convert('pascal')">PascalCase</button>
        <button onclick="convert('snake')">snake_case</button>
        <button onclick="convert('kebab')">kebab-case</button>
    </div>
    
    <div class="actions">
        <button class="clear" onclick="document.getElementById('textInput').value=''; updateStats()">Clear</button>
        <button id="copyBtn" onclick="copyText()">Copy to Clipboard</button>
    </div>
    <div class="stats" id="stats">Characters: 0 | Words: 0 | Lines: 0</div>
</div>

<script>
const input = document.getElementById('textInput');
const stats = document.getElementById('stats');
const copyBtn = document.getElementById('copyBtn');

function convert(type) {
    let txt = input.value;
    if(!txt) return;

    switch(type) {
        case 'lower':
            txt = txt.toLowerCase();
            break;
        case 'upper':
            txt = txt.toUpperCase();
            break;
        case 'title':
            txt = txt.toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.substring(1)).join(' ');
            break;
        case 'sentence':
            txt = txt.toLowerCase().replace(/(^\s*\w|[.?!]\s*\w)/g, c => c.toUpperCase());
            break;
        case 'camel':
            txt = txt.toLowerCase().replace(/[^a-zA-Z0-9]+(.)/g, (m, c) => c.toUpperCase());
            break;
        case 'pascal':
            txt = txt.toLowerCase().replace(/(?:^|[^a-zA-Z0-9]+)(.)/g, (m, c) => c.toUpperCase());
            break;
        case 'snake':
            txt = txt.replace(/\W+/g, ' ').trim().replace(/\s+/g, '_').toLowerCase();
            break;
        case 'kebab':
            txt = txt.replace(/\W+/g, ' ').trim().replace(/\s+/g, '-').toLowerCase();
            break;
    }
    input.value = txt;
}

function copyText() {
    if(!input.value) return;
    navigator.clipboard.writeText(input.value);
    const orig = copyBtn.textContent;
    copyBtn.textContent = 'Copied! ✓';
    setTimeout(() => copyBtn.textContent = orig, 1500);
}

function updateStats() {
    const txt = input.value;
    const chars = txt.length;
    const words = txt.trim() === '' ? 0 : txt.trim().split(/\s+/).length;
    const lines = txt === '' ? 0 : txt.split('\n').length;
    stats.textContent = `Characters: ${chars} | Words: ${words} | Lines: ${lines}`;
}

input.addEventListener('input', updateStats);
</script>
</body>
</html>
