<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f0f0f5;height:100vh;display:flex;flex-direction:column}
.header{padding:15px 20px;background:#16162a;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center}
h1{font-size:18px;color:#fff}
.actions{display:flex;gap:10px}
.actions button{background:#1a1a2e;color:#a0a0b8;border:1px solid rgba(255,255,255,0.1);padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:600;transition:all 0.2s}
.actions button:hover{background:#2a2a3e;color:#fff}
.actions button.primary{background:#00b894;color:#1a1a2e;border:none}
.actions button.primary:hover{background:#00a383}
.editor-container{flex:1;display:flex;overflow:hidden}
.pane{flex:1;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,0.05)}
.pane-title{padding:10px 15px;background:#12121a;font-size:12px;color:#a0a0b8;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center}
textarea{flex:1;background:#0a0a0f;color:#e0e0e0;border:none;padding:20px;font-family:monospace;font-size:14px;line-height:1.5;resize:none;outline:none}
.status{font-size:12px;color:#ff7675;font-weight:bold}
.status.valid{color:#00b894}
/* Basic syntax highlighting simulation via regex on final output */
.formatted-pane{background:#0a0a0f;padding:20px;overflow:auto;font-family:monospace;font-size:14px;line-height:1.5;color:#e0e0e0;white-space:pre}
.key{color:#a29bfe}
.string{color:#55efc4}
.number{color:#fdcb6e}
.boolean{color:#fd79a8}
.null{color:#ff7675}
</style>
</head>
<body>
<div class="header">
    <h1>📋 JSON Formatter</h1>
    <div class="actions">
        <button onclick="clearAll()">Clear</button>
        <button class="primary" onclick="formatJSON()">Format</button>
    </div>
</div>
<div class="editor-container">
    <div class="pane">
        <div class="pane-title">Input</div>
        <textarea id="input" placeholder="Paste unformatted JSON here..."></textarea>
    </div>
    <div class="pane">
        <div class="pane-title">
            Output
            <span id="status" class="status"></span>
        </div>
        <div id="output" class="formatted-pane"></div>
    </div>
</div>

<script>
const inputEl = document.getElementById('input');
const outputEl = document.getElementById('output');
const statusEl = document.getElementById('status');

function formatJSON() {
    const raw = inputEl.value.trim();
    if(!raw) {
        statusEl.textContent = '';
        outputEl.innerHTML = '';
        return;
    }
    
    try {
        const obj = JSON.parse(raw);
        const pretty = JSON.stringify(obj, null, 4);
        statusEl.textContent = 'Valid JSON ✓';
        statusEl.className = 'status valid';
        
        // Basic Syntax Highlighting
        outputEl.innerHTML = syntaxHighlight(pretty);
    } catch(e) {
        statusEl.textContent = 'Invalid JSON ✗';
        statusEl.className = 'status';
        outputEl.textContent = e.message;
    }
}

function syntaxHighlight(json) {
    json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
        let cls = 'number';
        if (/^"/.test(match)) {
            if (/:$/.test(match)) {
                cls = 'key';
            } else {
                cls = 'string';
            }
        } else if (/true|false/.test(match)) {
            cls = 'boolean';
        } else if (/null/.test(match)) {
            cls = 'null';
        }
        return '<span class="' + cls + '">' + match + '</span>';
    });
}

function clearAll() {
    inputEl.value = '';
    outputEl.innerHTML = '';
    statusEl.textContent = '';
}

inputEl.addEventListener('input', () => {
    statusEl.textContent = ''; // clear status on typing
});
</script>
</body>
</html>
