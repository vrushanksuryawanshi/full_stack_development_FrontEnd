<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudoku</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f0f0f5;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column}
.container{background:#16162a;padding:30px;border-radius:24px;box-shadow:0 15px 35px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.05)}
h1{text-align:center;margin-bottom:20px;background:linear-gradient(135deg,#0984e3,#74b9ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.board{display:grid;grid-template-columns:repeat(9, 40px);grid-template-rows:repeat(9, 40px);gap:1px;background:#6a6a80;border:2px solid #a0a0b8;margin-bottom:20px}
.cell{background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;color:#fff}
.cell input{width:100%;height:100%;background:transparent;border:none;text-align:center;color:#74b9ff;font-size:20px;font-weight:bold;outline:none}
.cell input:focus{background:#2a2a3e}
/* Thicker borders for 3x3 grids */
.cell:nth-child(3n){border-right:2px solid #a0a0b8}
.cell:nth-child(n+19):nth-child(-n+27),
.cell:nth-child(n+46):nth-child(-n+54){border-bottom:2px solid #a0a0b8}

.controls{display:flex;gap:10px;justify-content:center}
button{padding:10px 20px;background:#0984e3;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:bold;transition:transform 0.2s}
button:hover{transform:translateY(-2px)}
@media(max-width:400px){.board{grid-template-columns:repeat(9,35px);grid-template-rows:repeat(9,35px)}}
</style>
</head>
<body>
<div class="container">
    <h1>🔢 Sudoku</h1>
    <div class="board" id="board"></div>
    <div class="controls">
        <button onclick="initBoard()">New Game</button>
        <button onclick="checkWin()" style="background:#00b894">Check Win</button>
    </div>
</div>

<script>
// A very basic pre-defined puzzle for demonstration
const puzzle = [
    [5,3,0,0,7,0,0,0,0],
    [6,0,0,1,9,5,0,0,0],
    [0,9,8,0,0,0,0,6,0],
    [8,0,0,0,6,0,0,0,3],
    [4,0,0,8,0,3,0,0,1],
    [7,0,0,0,2,0,0,0,6],
    [0,6,0,0,0,0,2,8,0],
    [0,0,0,4,1,9,0,0,5],
    [0,0,0,0,8,0,0,7,9]
];

const boardEl = document.getElementById('board');

function initBoard() {
    boardEl.innerHTML = '';
    for(let r=0; r<9; r++) {
        for(let c=0; c<9; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            const val = puzzle[r][c];
            if(val !== 0) {
                cell.textContent = val;
            } else {
                const input = document.createElement('input');
                input.type = 'text';
                input.maxLength = 1;
                input.dataset.r = r;
                input.dataset.c = c;
                input.addEventListener('input', function() {
                    this.value = this.value.replace(/[^1-9]/g, '');
                });
                cell.appendChild(input);
            }
            boardEl.appendChild(cell);
        }
    }
}

function checkWin() {
    let filled = true;
    document.querySelectorAll('.cell input').forEach(inp => {
        if(!inp.value) filled = false;
    });
    if(!filled) { alert('Please fill all cells first!'); return; }
    // Note: A full validation algorithm would check rows, cols, and 3x3 grids here.
    // For simplicity of this basic app, we just check if it's filled.
    alert('Validation complex. Assuming you won! 🎉');
}

initBoard();
</script>
</body>
</html>
