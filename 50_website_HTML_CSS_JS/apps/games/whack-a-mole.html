<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whack-a-Mole</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f0f0f5;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column}
h1{margin-bottom:10px;color:#ff7675}
.stats{display:flex;gap:30px;font-size:24px;font-weight:bold;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(3, 100px);gap:15px;background:#16162a;padding:20px;border-radius:24px;border:1px solid rgba(255,255,255,0.05)}
.hole{width:100px;height:100px;background:#1a1a2e;border-radius:50%;position:relative;overflow:hidden;border:4px solid #2a2a3e}
.mole{width:80px;height:80px;background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="%238b4513"/><circle cx="35" cy="40" r="5" fill="white"/><circle cx="65" cy="40" r="5" fill="white"/><circle cx="50" cy="55" r="8" fill="pink"/></svg>') center/cover;position:absolute;bottom:-100%;left:10px;transition:bottom 0.1s;cursor:crosshair}
.hole.up .mole{bottom:0}
.controls{margin-top:20px}
button{padding:12px 24px;background:#ff7675;color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:bold;cursor:pointer}
</style>
</head>
<body>
    <h1>🔨 Whack-a-Mole</h1>
    <div class="stats">
        <div>Score: <span id="score">0</span></div>
        <div>Time: <span id="time">30</span></div>
    </div>
    <div class="grid">
        <div class="hole"><div class="mole"></div></div><div class="hole"><div class="mole"></div></div><div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div><div class="hole"><div class="mole"></div></div><div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div><div class="hole"><div class="mole"></div></div><div class="hole"><div class="mole"></div></div>
    </div>
    <div class="controls"><button onclick="startGame()">Start Game</button></div>

<script>
const holes = document.querySelectorAll('.hole');
const scoreBoard = document.getElementById('score');
const timeBoard = document.getElementById('time');
const moles = document.querySelectorAll('.mole');
let lastHole, timeUp = false, score = 0;

function randomTime(min, max) { return Math.round(Math.random() * (max - min) + min); }

function randomHole(holes) {
    const idx = Math.floor(Math.random() * holes.length);
    const hole = holes[idx];
    if (hole === lastHole) return randomHole(holes);
    lastHole = hole;
    return hole;
}

function peep() {
    const time = randomTime(400, 1000);
    const hole = randomHole(holes);
    hole.classList.add('up');
    setTimeout(() => {
        hole.classList.remove('up');
        if (!timeUp) peep();
    }, time);
}

function startGame() {
    scoreBoard.textContent = 0;
    timeBoard.textContent = 30;
    timeUp = false;
    score = 0;
    peep();
    
    let timeLeft = 30;
    const timer = setInterval(() => {
        timeLeft--;
        timeBoard.textContent = timeLeft;
        if(timeLeft <= 0) {
            clearInterval(timer);
            timeUp = true;
            alert(`Game Over! Score: ${score}`);
        }
    }, 1000);
}

function whack(e) {
    if(!e.isTrusted) return; // cheater check
    score++;
    this.parentNode.classList.remove('up');
    scoreBoard.textContent = score;
}

moles.forEach(mole => mole.addEventListener('click', whack));
</script>
</body>
</html>
