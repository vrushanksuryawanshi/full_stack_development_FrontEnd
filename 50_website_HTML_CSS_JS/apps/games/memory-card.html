<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Card Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f0f0f5;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column}
h1{margin-bottom:10px;background:linear-gradient(135deg,#a29bfe,#6c5ce7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stats{display:flex;gap:20px;margin-bottom:20px;font-size:18px;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(4,80px);gap:10px;perspective:1000px}
.card{width:80px;height:80px;position:relative;transform-style:preserve-3d;transition:transform 0.5s;cursor:pointer}
.card.flip{transform:rotateY(180deg)}
.front,.back{width:100%;height:100%;position:absolute;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;font-size:40px;border-radius:12px}
.front{background:#16162a;transform:rotateY(0deg);border:2px solid rgba(255,255,255,0.1)}
.back{background:#6c5ce7;transform:rotateY(180deg)}
button{margin-top:30px;padding:12px 24px;background:#6c5ce7;color:#fff;border:none;border-radius:12px;font-weight:bold;cursor:pointer;font-size:16px}
</style>
</head>
<body>
    <h1>🃏 Memory Cards</h1>
    <div class="stats">
        <div>Moves: <span id="moves">0</span></div>
        <div>Matches: <span id="matches">0</span>/8</div>
    </div>
    <div class="grid" id="grid"></div>
    <button onclick="initGame()">Restart</button>

<script>
const emojis = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼'];
let cards = [], hasFlipped = false, lockBoard = false, first, second;
let moves = 0, matches = 0;

function initGame() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    cards = [...emojis, ...emojis].sort(() => 0.5 - Math.random());
    moves = 0; matches = 0;
    updateStats();

    cards.forEach(emoji => {
        const card = document.createElement('div');
        card.classList.add('card');
        card.dataset.emoji = emoji;
        card.innerHTML = `
            <div class="front"></div>
            <div class="back">${emoji}</div>
        `;
        card.addEventListener('click', flipCard);
        grid.appendChild(card);
    });
}

function flipCard() {
    if(lockBoard || this === first) return;
    this.classList.add('flip');

    if(!hasFlipped) {
        hasFlipped = true;
        first = this;
        return;
    }

    second = this;
    moves++;
    updateStats();
    checkForMatch();
}

function checkForMatch() {
    if(first.dataset.emoji === second.dataset.emoji) {
        matches++;
        updateStats();
        resetBoard();
        if(matches === emojis.length) setTimeout(() => alert('You won!'), 500);
    } else {
        lockBoard = true;
        setTimeout(() => {
            first.classList.remove('flip');
            second.classList.remove('flip');
            resetBoard();
        }, 1000);
    }
}

function resetBoard() {
    [hasFlipped, lockBoard] = [false, false];
    [first, second] = [null, null];
}

function updateStats() {
    document.getElementById('moves').textContent = moves;
    document.getElementById('matches').textContent = matches;
}

initGame();
</script>
</body>
</html>
