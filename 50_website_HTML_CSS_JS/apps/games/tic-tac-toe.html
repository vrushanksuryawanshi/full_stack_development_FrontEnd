<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f0f0f5;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column}
.container{text-align:center;background:#16162a;padding:40px;border-radius:24px;box-shadow:0 15px 35px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.05)}
h1{margin-bottom:20px;background:linear-gradient(135deg,#e17055,#fab1a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.board{display:grid;grid-template-columns:repeat(3,100px);gap:10px;margin:0 auto 20px}
.cell{width:100px;height:100px;background:#1a1a2e;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:bold;cursor:pointer;transition:all 0.2s;border:2px solid transparent}
.cell:hover{background:#2a2a3e}
.cell.x{color:#e17055}
.cell.o{color:#74b9ff}
.status{font-size:18px;margin-bottom:20px;font-weight:bold}
.reset-btn{padding:12px 24px;background:#e17055;color:#fff;border:none;border-radius:12px;font-weight:bold;cursor:pointer;font-size:16px;transition:transform 0.2s}
.reset-btn:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<div class="container">
    <h1>Tic Tac Toe</h1>
    <div class="status" id="status">Player X's turn</div>
    <div class="board" id="board">
        <div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div>
    </div>
    <button class="reset-btn" onclick="resetGame()">Restart Game</button>
</div>
<script>
const cells = document.querySelectorAll('.cell');
const statusText = document.getElementById('status');
let board = ['','','','','','','','',''];
let currentPlayer = 'X';
let running = true;
const winConditions = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
];

cells.forEach(cell => cell.addEventListener('click', cellClicked));

function cellClicked() {
    const idx = this.getAttribute('data-index');
    if(board[idx] !== '' || !running) return;
    
    updateCell(this, idx);
    checkWinner();
}

function updateCell(cell, index) {
    board[index] = currentPlayer;
    cell.textContent = currentPlayer;
    cell.classList.add(currentPlayer.toLowerCase());
}

function checkWinner() {
    let won = false;
    for(let i=0; i<winConditions.length; i++) {
        const [a,b,c] = winConditions[i];
        if(board[a] && board[a] === board[b] && board[a] === board[c]) {
            won = true;
            break;
        }
    }

    if(won) {
        statusText.textContent = `Player ${currentPlayer} Wins!`;
        running = false;
    } else if(!board.includes('')) {
        statusText.textContent = `Draw!`;
        running = false;
    } else {
        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        statusText.textContent = `Player ${currentPlayer}'s turn`;
    }
}

function resetGame() {
    currentPlayer = 'X';
    board = ['','','','','','','','',''];
    statusText.textContent = `Player X's turn`;
    cells.forEach(cell => {
        cell.textContent = '';
        cell.classList.remove('x', 'o');
    });
    running = true;
}
</script>
</body>
</html>
