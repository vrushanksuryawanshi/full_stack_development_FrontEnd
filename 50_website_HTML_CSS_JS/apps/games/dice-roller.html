<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice Roller</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f0f0f5;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column}
.container{text-align:center;background:#16162a;padding:40px;border-radius:24px;border:1px solid rgba(255,255,255,0.05);box-shadow:0 15px 35px rgba(0,0,0,0.5)}
h1{margin-bottom:30px;color:#fdcb6e}
.dice-container{display:flex;gap:20px;margin-bottom:30px;justify-content:center}
.dice{width:100px;height:100px;background:#f0f0f5;border-radius:20px;box-shadow:inset 0 0 15px rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center;font-size:60px;color:#1a1a2e;transition:transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)}
.rolling{animation:roll 0.5s ease infinite}
@keyframes roll { 
    0% { transform: rotate(0deg) scale(1); } 
    50% { transform: rotate(180deg) scale(0.8); } 
    100% { transform: rotate(360deg) scale(1); } 
}
.result{font-size:24px;font-weight:bold;margin-bottom:20px;height:30px}
button{padding:15px 30px;background:linear-gradient(135deg,#fdcb6e,#e17055);color:#fff;border:none;border-radius:12px;font-size:20px;font-weight:bold;cursor:pointer;transition:transform 0.2s}
button:hover{transform:translateY(-3px)}
</style>
</head>
<body>
<div class="container">
    <h1>🎲 Dice Roller</h1>
    <div class="dice-container">
        <div class="dice" id="dice1">⚀</div>
        <div class="dice" id="dice2">⚀</div>
    </div>
    <div class="result" id="resultText">Roll the dice!</div>
    <button onclick="rollDice()">ROLL</button>
</div>

<script>
const diceFaces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
const dice1 = document.getElementById('dice1');
const dice2 = document.getElementById('dice2');
const resultText = document.getElementById('resultText');

function rollDice() {
    // Add animation
    dice1.classList.add('rolling');
    dice2.classList.add('rolling');
    resultText.textContent = 'Rolling...';
    
    // Simulate delay
    setTimeout(() => {
        const val1 = Math.floor(Math.random() * 6);
        const val2 = Math.floor(Math.random() * 6);
        
        dice1.classList.remove('rolling');
        dice2.classList.remove('rolling');
        
        dice1.textContent = diceFaces[val1];
        dice2.textContent = diceFaces[val2];
        
        const sum = val1 + val2 + 2;
        resultText.textContent = `You rolled a ${sum}!`;
    }, 1000);
}
</script>
</body>
</html>
