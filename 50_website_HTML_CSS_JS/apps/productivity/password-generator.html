<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f0f0f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{background:#16162a;padding:30px;border-radius:20px;width:100%;max-width:450px;box-shadow:0 15px 35px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.05)}
h1{font-size:22px;margin-bottom:20px;text-align:center;color:#fff}
.result-box{background:#12121a;border:1px solid rgba(255,255,255,0.1);padding:15px 20px;border-radius:12px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.result{font-family:monospace;font-size:20px;letter-spacing:1px;color:#a29bfe;word-break:break-all}
.copy-btn{background:#6c5ce7;border:none;color:#fff;padding:8px 15px;border-radius:8px;cursor:pointer;font-weight:bold;transition:background 0.2s}
.copy-btn:hover{background:#5a4bcf}
.options{display:flex;flex-direction:column;gap:15px;margin-bottom:25px}
.option{display:flex;justify-content:space-between;align-items:center}
.option label{font-size:15px;color:#a0a0b8}
input[type="range"]{width:60%;accent-color:#6c5ce7}
input[type="checkbox"]{width:18px;height:18px;accent-color:#6c5ce7;cursor:pointer}
.generate-btn{width:100%;padding:15px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:bold;cursor:pointer;transition:transform 0.2s}
.generate-btn:hover{transform:translateY(-2px)}
.strength{margin-top:20px;height:6px;background:#1a1a2e;border-radius:3px;overflow:hidden}
.strength-bar{height:100%;width:0;transition:all 0.3s}
.strength-text{text-align:center;font-size:12px;margin-top:8px;color:#a0a0b8;text-transform:uppercase}
</style>
</head>
<body>
<div class="container">
    <h1>🔐 Password Generator</h1>
    <div class="result-box">
        <span class="result" id="result">Click Generate</span>
        <button class="copy-btn" onclick="copyPassword()" id="copyBtn">Copy</button>
    </div>
    
    <div class="options">
        <div class="option">
            <label>Password Length (<span id="lenDisplay">16</span>)</label>
            <input type="range" id="length" min="8" max="32" value="16" oninput="document.getElementById('lenDisplay').textContent=this.value">
        </div>
        <div class="option">
            <label>Include Uppercase</label>
            <input type="checkbox" id="uppercase" checked>
        </div>
        <div class="option">
            <label>Include Lowercase</label>
            <input type="checkbox" id="lowercase" checked>
        </div>
        <div class="option">
            <label>Include Numbers</label>
            <input type="checkbox" id="numbers" checked>
        </div>
        <div class="option">
            <label>Include Symbols</label>
            <input type="checkbox" id="symbols" checked>
        </div>
    </div>
    
    <button class="generate-btn" onclick="generatePassword()">Generate Password</button>
    
    <div class="strength">
        <div class="strength-bar" id="strengthBar"></div>
    </div>
    <div class="strength-text" id="strengthText"></div>
</div>
<script>
const resultEl = document.getElementById('result');
const lengthEl = document.getElementById('length');
const uppercaseEl = document.getElementById('uppercase');
const lowercaseEl = document.getElementById('lowercase');
const numbersEl = document.getElementById('numbers');
const symbolsEl = document.getElementById('symbols');
const strengthBar = document.getElementById('strengthBar');
const strengthText = document.getElementById('strengthText');
const copyBtn = document.getElementById('copyBtn');

const randomFunc = {
    lower: () => String.fromCharCode(Math.floor(Math.random() * 26) + 97),
    upper: () => String.fromCharCode(Math.floor(Math.random() * 26) + 65),
    number: () => String.fromCharCode(Math.floor(Math.random() * 10) + 48),
    symbol: () => {
        const symbols = '!@#$%^&*(){}[]=<>/,.';
        return symbols[Math.floor(Math.random() * symbols.length)];
    }
};

function generatePassword() {
    const length = +lengthEl.value;
    const hasLower = lowercaseEl.checked;
    const hasUpper = uppercaseEl.checked;
    const hasNumber = numbersEl.checked;
    const hasSymbol = symbolsEl.checked;
    
    let generatedPassword = '';
    const typesCount = hasLower + hasUpper + hasNumber + hasSymbol;
    const typesArr = [{lower:hasLower}, {upper:hasUpper}, {number:hasNumber}, {symbol:hasSymbol}].filter(item => Object.values(item)[0]);
    
    if(typesCount === 0) { resultEl.textContent = 'Select options'; return; }
    
    for(let i=0; i<length; i+=typesCount) {
        typesArr.forEach(type => {
            const funcName = Object.keys(type)[0];
            generatedPassword += randomFunc[funcName]();
        });
    }
    
    const finalPassword = generatedPassword.slice(0, length);
    // Shuffle the string slightly for better randomness
    resultEl.textContent = finalPassword.split('').sort(() => 0.5 - Math.random()).join('');
    updateStrength(length, typesCount);
    copyBtn.textContent = 'Copy';
    copyBtn.style.background = '#6c5ce7';
}

function updateStrength(len, types) {
    let score = len * types;
    let color = '', text = '', width = '';
    if(score < 30) { color = '#ff7675'; text = 'Weak'; width = '33%'; }
    else if(score < 50) { color = '#fdcb6e'; text = 'Medium'; width = '66%'; }
    else { color = '#00b894'; text = 'Strong'; width = '100%'; }
    
    strengthBar.style.width = width;
    strengthBar.style.background = color;
    strengthText.textContent = text;
    strengthText.style.color = color;
}

function copyPassword() {
    if(!resultEl.textContent || resultEl.textContent === 'Click Generate') return;
    navigator.clipboard.writeText(resultEl.textContent);
    copyBtn.textContent = 'Copied!';
    copyBtn.style.background = '#00b894';
}

generatePassword();
</script>
</body>
</html>
