<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f0f0f5;padding:20px}
.container{max-width:500px;margin:0 auto}
h1{text-align:center;margin-bottom:20px;background:linear-gradient(135deg,#00b894,#55efc4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.balance-card{background:linear-gradient(135deg,#16162a,#1e1e3a);padding:25px;border-radius:16px;text-align:center;margin-bottom:20px;border:1px solid rgba(255,255,255,0.05);box-shadow:0 10px 20px rgba(0,0,0,0.3)}
.balance-card h3{font-size:14px;color:#a0a0b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.balance-amount{font-size:36px;font-weight:800;color:#fff}
.inc-exp-container{display:flex;justify-content:space-between;gap:15px;margin-bottom:20px}
.inc-exp-box{flex:1;background:#16162a;padding:15px;border-radius:12px;text-align:center;border:1px solid rgba(255,255,255,0.05)}
.inc-exp-box h4{font-size:12px;color:#a0a0b8;text-transform:uppercase;margin-bottom:5px}
.money.plus{color:#00b894;font-size:20px;font-weight:bold}
.money.minus{color:#ff7675;font-size:20px;font-weight:bold}
.transaction-list{list-style:none;margin-bottom:20px;max-height:300px;overflow-y:auto}
.transaction-item{background:#16162a;border:1px solid rgba(255,255,255,0.05);padding:15px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;border-left:4px solid transparent}
.transaction-item.plus{border-left-color:#00b894}
.transaction-item.minus{border-left-color:#ff7675}
.delete-btn{background:none;border:none;color:#ff7675;cursor:pointer;font-size:16px;opacity:0;transition:opacity 0.2s}
.transaction-item:hover .delete-btn{opacity:1}
.form-control{margin-bottom:15px}
.form-control label{display:block;margin-bottom:5px;color:#a0a0b8;font-size:14px}
.form-control input{width:100%;padding:12px;background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;outline:none;font-family:inherit}
.form-control input:focus{border-color:#00b894}
.btn{width:100%;background:#00b894;color:#000;border:none;padding:15px;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;transition:transform 0.2s}
.btn:hover{transform:translateY(-2px)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
</style>
</head>
<body>
<div class="container">
    <h1>💰 Expense Tracker</h1>
    <div class="balance-card">
        <h3>Your Balance</h3>
        <h1 class="balance-amount" id="balance">$0.00</h1>
    </div>
    <div class="inc-exp-container">
        <div class="inc-exp-box">
            <h4>Income</h4>
            <p class="money plus" id="money-plus">+$0.00</p>
        </div>
        <div class="inc-exp-box">
            <h4>Expense</h4>
            <p class="money minus" id="money-minus">-$0.00</p>
        </div>
    </div>
    
    <h3 style="margin-bottom: 10px; font-size: 16px;">History</h3>
    <ul class="transaction-list" id="list"></ul>
    
    <h3 style="margin-bottom: 10px; font-size: 16px; margin-top:20px;">Add New Transaction</h3>
    <form id="form">
        <div class="form-control">
            <label for="text">Text</label>
            <input type="text" id="text" placeholder="Enter text..." required>
        </div>
        <div class="form-control">
            <label for="amount">Amount <br> <small>(negative = expense, positive = income)</small></label>
            <input type="number" id="amount" placeholder="Enter amount..." required>
        </div>
        <button class="btn">Add transaction</button>
    </form>
</div>
<script>
const balance = document.getElementById('balance');
const money_plus = document.getElementById('money-plus');
const money_minus = document.getElementById('money-minus');
const list = document.getElementById('list');
const form = document.getElementById('form');
const text = document.getElementById('text');
const amount = document.getElementById('amount');

let transactions = JSON.parse(localStorage.getItem('hub_expenses')) || [];

function addTransaction(e) {
    e.preventDefault();
    if(text.value.trim() === '' || amount.value.trim() === '') return;
    const transaction = {
        id: Date.now(),
        text: text.value,
        amount: +amount.value
    };
    transactions.push(transaction);
    addTransactionDOM(transaction);
    updateValues();
    updateLocalStorage();
    text.value = '';
    amount.value = '';
}

function addTransactionDOM(transaction) {
    const sign = transaction.amount < 0 ? '-' : '+';
    const item = document.createElement('li');
    item.classList.add('transaction-item');
    item.classList.add(transaction.amount < 0 ? 'minus' : 'plus');
    item.innerHTML = `
        <span>${transaction.text}</span>
        <span>${sign}$${Math.abs(transaction.amount).toFixed(2)} 
            <button class="delete-btn" onclick="removeTransaction(${transaction.id})">✖</button>
        </span>
    `;
    list.appendChild(item);
}

function updateValues() {
    const amounts = transactions.map(t => t.amount);
    const total = amounts.reduce((acc, item) => (acc += item), 0).toFixed(2);
    const income = amounts.filter(item => item > 0).reduce((acc, item) => (acc += item), 0).toFixed(2);
    const expense = (amounts.filter(item => item < 0).reduce((acc, item) => (acc += item), 0) * -1).toFixed(2);

    balance.innerText = `$${total}`;
    money_plus.innerText = `+$${income}`;
    money_minus.innerText = `-$${expense}`;
}

function removeTransaction(id) {
    transactions = transactions.filter(t => t.id !== id);
    updateLocalStorage();
    init();
}

function updateLocalStorage() {
    localStorage.setItem('hub_expenses', JSON.stringify(transactions));
}

function init() {
    list.innerHTML = '';
    transactions.forEach(addTransactionDOM);
    updateValues();
}

form.addEventListener('submit', addTransaction);
init();
</script>
</body>
</html>
