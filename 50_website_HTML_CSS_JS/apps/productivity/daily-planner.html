<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Planner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f0f0f5;padding:20px}
.container{max-width:700px;margin:0 auto;background:#16162a;padding:30px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
h1{font-size:24px;text-align:center;margin-bottom:20px;background:linear-gradient(135deg,#fdcb6e,#e17055);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.date-selector{display:flex;justify-content:center;align-items:center;gap:15px;margin-bottom:30px}
.date-selector button{background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;transition:all 0.2s}
.date-selector button:hover{background:#2a2a3e}
.current-date{font-weight:bold;font-size:18px;min-width:150px;text-align:center}
.timeline{display:flex;flex-direction:column;gap:10px}
.hour-block{display:flex;background:#12121a;border:1px solid rgba(255,255,255,0.05);border-radius:8px;overflow:hidden}
.time-label{width:80px;background:#1a1a2e;padding:15px;text-align:center;font-weight:600;font-size:14px;color:#a0a0b8;border-right:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center}
.task-input{flex:1;background:transparent;border:none;padding:15px;color:#f0f0f5;font-family:inherit;font-size:15px;outline:none;transition:background 0.2s}
.task-input:focus{background:rgba(255,255,255,0.02)}
.task-input.completed{text-decoration:line-through;color:#6a6a80}
.check-btn{width:50px;background:transparent;border:none;border-left:1px solid rgba(255,255,255,0.05);color:#a0a0b8;cursor:pointer;font-size:18px;transition:all 0.2s}
.check-btn:hover{background:rgba(108,92,231,0.1);color:#6c5ce7}
.check-btn.active{color:#00b894}
</style>
</head>
<body>
<div class="container">
    <h1>📅 Daily Planner</h1>
    <div class="date-selector">
        <button onclick="changeDate(-1)">← Prev</button>
        <div class="current-date" id="dateDisplay"></div>
        <button onclick="changeDate(1)">Next →</button>
    </div>
    <div class="timeline" id="timeline"></div>
</div>
<script>
let currentDate = new Date();
let planData = JSON.parse(localStorage.getItem('hub_planner') || '{}');

function formatDate(date) {
    return date.toISOString().split('T')[0];
}

function save() {
    localStorage.setItem('hub_planner', JSON.stringify(planData));
}

function changeDate(days) {
    currentDate.setDate(currentDate.getDate() + days);
    render();
}

function toggleStatus(dateStr, hour) {
    if (!planData[dateStr]) planData[dateStr] = {};
    if (!planData[dateStr][hour]) planData[dateStr][hour] = { text: '', done: false };
    planData[dateStr][hour].done = !planData[dateStr][hour].done;
    save(); render();
}

function updateTask(dateStr, hour, text) {
    if (!planData[dateStr]) planData[dateStr] = {};
    if (!planData[dateStr][hour]) planData[dateStr][hour] = { done: false };
    planData[dateStr][hour].text = text;
    save();
}

function render() {
    const dateStr = formatDate(currentDate);
    const options = { weekday: 'short', month: 'short', day: 'numeric' };
    document.getElementById('dateDisplay').textContent = currentDate.toLocaleDateString('en-US', options);

    const timeline = document.getElementById('timeline');
    timeline.innerHTML = '';
    
    const dayData = planData[dateStr] || {};

    for (let i = 6; i <= 23; i++) {
        const hourLabel = `${i === 12 ? 12 : i % 12}:00 ${i < 12 ? 'AM' : 'PM'}`;
        const data = dayData[i] || { text: '', done: false };
        
        const block = document.createElement('div');
        block.className = 'hour-block';
        block.innerHTML = `
            <div class="time-label">${hourLabel}</div>
            <input type="text" class="task-input ${data.done ? 'completed' : ''}" 
                   placeholder="Enter task..." value="${data.text || ''}"
                   oninput="updateTask('${dateStr}', ${i}, this.value)">
            <button class="check-btn ${data.done ? 'active' : ''}" 
                    onclick="toggleStatus('${dateStr}', ${i})">✓</button>
        `;
        timeline.appendChild(block);
    }
}

render();
</script>
</body>
</html>
