<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#0a0a0f;color:#f0f0f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{background:#16162a;padding:40px;border-radius:24px;border:1px solid rgba(255,255,255,0.06);text-align:center;width:100%;max-width:400px;box-shadow:0 16px 48px rgba(0,0,0,0.5)}
.mode-tabs{display:flex;background:#0e0e18;border-radius:12px;padding:4px;margin-bottom:32px}
.mode-btn{flex:1;padding:10px;background:none;border:none;color:#a0a0b8;font-size:14px;font-weight:600;cursor:pointer;border-radius:8px;transition:all 0.2s}
.mode-btn.active{background:#6c5ce7;color:#fff}
.timer-display{font-size:80px;font-weight:800;letter-spacing:-2px;margin-bottom:32px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-variant-numeric:tabular-nums}
.controls{display:flex;justify-content:center;gap:16px}
.btn{padding:14px 32px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-main{background:#6c5ce7;color:#fff;box-shadow:0 0 20px rgba(108,92,231,0.3)}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(108,92,231,0.5)}
.btn-secondary{background:#1a1a2e;color:#a0a0b8;border:1px solid rgba(255,255,255,0.1)}
.btn-secondary:hover{background:#1e1e3a;color:#f0f0f5}
</style>
</head>
<body>
<div class="container">
    <div class="mode-tabs">
        <button class="mode-btn active" data-mode="pomodoro">Pomodoro</button>
        <button class="mode-btn" data-mode="shortBreak">Short Break</button>
        <button class="mode-btn" data-mode="longBreak">Long Break</button>
    </div>
    <div class="timer-display" id="time">25:00</div>
    <div class="controls">
        <button class="btn btn-main" id="startBtn">START</button>
        <button class="btn btn-secondary" id="resetBtn">RESET</button>
    </div>
</div>
<script>
const times = { pomodoro: 25*60, shortBreak: 5*60, longBreak: 15*60 };
let mode = 'pomodoro', timeLeft = times[mode], isRunning = false, interval;

const timeDisplay = document.getElementById('time');
const startBtn = document.getElementById('startBtn');
const modeBtns = document.querySelectorAll('.mode-btn');

function updateDisplay() {
    const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
    const s = (timeLeft % 60).toString().padStart(2, '0');
    timeDisplay.textContent = `${m}:${s}`;
}

function switchMode(newMode) {
    mode = newMode;
    timeLeft = times[mode];
    isRunning = false;
    clearInterval(interval);
    startBtn.textContent = 'START';
    modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    updateDisplay();
}

function toggleTimer() {
    if (isRunning) {
        clearInterval(interval);
        startBtn.textContent = 'START';
    } else {
        interval = setInterval(() => {
            timeLeft--;
            updateDisplay();
            if (timeLeft <= 0) {
                clearInterval(interval);
                alert('Time is up!');
                switchMode(mode);
            }
        }, 1000);
        startBtn.textContent = 'PAUSE';
    }
    isRunning = !isRunning;
}

modeBtns.forEach(btn => btn.addEventListener('click', () => switchMode(btn.dataset.mode)));
startBtn.addEventListener('click', toggleTimer);
document.getElementById('resetBtn').addEventListener('click', () => switchMode(mode));

updateDisplay();
</script>
</body>
</html>
