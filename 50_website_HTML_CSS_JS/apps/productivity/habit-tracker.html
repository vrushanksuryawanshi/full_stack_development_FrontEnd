<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f0f0f5;padding:20px}
.container{max-width:800px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}
h1{font-size:24px;background:linear-gradient(135deg,#00b894,#55efc4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.add-form{display:flex;gap:10px}
input{padding:10px;background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;outline:none}
button{padding:10px 20px;background:#00b894;color:#000;border:none;border-radius:8px;font-weight:bold;cursor:pointer;transition:transform 0.2s}
button:hover{transform:translateY(-2px)}
.habit-card{background:#16162a;padding:20px;border-radius:12px;margin-bottom:16px;display:flex;align-items:center;gap:20px}
.habit-info{flex:1}
.habit-name{font-weight:600;font-size:16px;margin-bottom:4px}
.streak{font-size:12px;color:#00b894}
.days-grid{display:flex;gap:8px}
.day-btn{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);background:#1a1a2e;color:#a0a0b8;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;transition:all 0.2s;padding:0}
.day-btn.completed{background:#00b894;color:#000;border-color:#00b894}
.delete-btn{background:none;border:none;color:#ff7675;padding:10px;cursor:pointer;border-radius:8px}
.delete-btn:hover{background:rgba(255,118,117,0.1);transform:none}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 Habit Tracker</h1>
        <div class="add-form">
            <input type="text" id="habitInput" placeholder="New habit...">
            <button onclick="addHabit()">Add</button>
        </div>
    </div>
    <div id="habitsList"></div>
</div>
<script>
let habits = JSON.parse(localStorage.getItem('hub_habits') || '[]');
const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function save() { localStorage.setItem('hub_habits', JSON.stringify(habits)); }

function addHabit() {
    const input = document.getElementById('habitInput');
    const name = input.value.trim();
    if(name) {
        habits.push({ id: Date.now(), name, history: {} });
        input.value = '';
        save(); render();
    }
}

function toggleDay(habitId, dateStr) {
    const habit = habits.find(h => h.id === habitId);
    if(habit) {
        habit.history[dateStr] = !habit.history[dateStr];
        save(); render();
    }
}

function deleteHabit(id) {
    habits = habits.filter(h => h.id !== id);
    save(); render();
}

function calculateStreak(history) {
    let streak = 0;
    const today = new Date();
    today.setHours(0,0,0,0);
    
    for(let i=0; i<365; i++) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        const dateStr = d.toISOString().split('T')[0];
        if(history[dateStr]) streak++;
        else if(i !== 0) break; // If missed a day (and not today), streak ends
    }
    return streak;
}

function render() {
    const list = document.getElementById('habitsList');
    list.innerHTML = '';
    
    // Get last 7 days including today
    const last7Days = Array.from({length: 7}, (_, i) => {
        const d = new Date();
        d.setDate(d.getDate() - (6 - i));
        return { dateStr: d.toISOString().split('T')[0], dayName: days[d.getDay()] };
    });

    habits.forEach(habit => {
        const streak = calculateStreak(habit.history);
        const card = document.createElement('div');
        card.className = 'habit-card';
        
        let daysHtml = last7Days.map(d => {
            const completed = habit.history[d.dateStr];
            return `<button class="day-btn ${completed ? 'completed' : ''}" 
                    onclick="toggleDay(${habit.id}, '${d.dateStr}')"
                    title="${d.dateStr}">${d.dayName[0]}</button>`;
        }).join('');

        card.innerHTML = `
            <div class="habit-info">
                <div class="habit-name">${habit.name}</div>
                <div class="streak">🔥 ${streak} day streak</div>
            </div>
            <div class="days-grid">${daysHtml}</div>
            <button class="delete-btn" onclick="deleteHabit(${habit.id})">✖</button>
        `;
        list.appendChild(card);
    });
}

render();
</script>
</body>
</html>
