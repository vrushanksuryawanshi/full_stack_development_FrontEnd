<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Editor</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f0f0f5;height:100vh;display:flex;flex-direction:column}
.header{padding:15px 20px;background:#16162a;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center}
h1{font-size:18px;color:#fff}
.actions button{background:#6c5ce7;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:600}
.editor-container{flex:1;display:flex;overflow:hidden}
.pane{flex:1;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,0.05)}
.pane-title{padding:10px 15px;background:#12121a;font-size:12px;color:#a0a0b8;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid rgba(255,255,255,0.05)}
textarea{flex:1;background:#0a0a0f;color:#e0e0e0;border:none;padding:20px;font-family:monospace;font-size:15px;line-height:1.6;resize:none;outline:none}
.preview-pane{background:#12121a;padding:20px;overflow-y:auto;line-height:1.6;color:#e0e0e0}
/* Markdown Styles */
.preview-pane h1,.preview-pane h2,.preview-pane h3{color:#fff;margin-top:20px;margin-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:5px}
.preview-pane p{margin-bottom:15px}
.preview-pane code{background:#1a1a2e;padding:2px 6px;border-radius:4px;font-family:monospace;color:#a29bfe}
.preview-pane pre{background:#1a1a2e;padding:15px;border-radius:8px;overflow-x:auto;margin-bottom:15px}
.preview-pane pre code{background:none;padding:0}
.preview-pane blockquote{border-left:4px solid #6c5ce7;padding-left:15px;color:#a0a0b8;margin-bottom:15px}
.preview-pane ul,.preview-pane ol{margin-bottom:15px;padding-left:25px}
.preview-pane img{max-width:100%;border-radius:8px}
.preview-pane a{color:#a29bfe;text-decoration:none}
.preview-pane a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="header">
    <h1>✍️ Markdown Editor</h1>
    <div class="actions">
        <button onclick="clearEditor()">Clear</button>
    </div>
</div>
<div class="editor-container">
    <div class="pane">
        <div class="pane-title">Markdown (Editor)</div>
        <textarea id="editor" placeholder="# Start writing markdown here..."></textarea>
    </div>
    <div class="pane">
        <div class="pane-title">Preview</div>
        <div class="preview-pane" id="preview"></div>
    </div>
</div>
<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');

// Load saved
const saved = localStorage.getItem('hub_markdown');
if(saved) {
    editor.value = saved;
    updatePreview();
} else {
    editor.value = "# Welcome to Markdown Editor\n\nStart typing on the left, see the preview on the right.\n\n## Features:\n- Live rendering\n- Autosave to local storage\n- Code block support\n\n```javascript\nconsole.log('Hello World');\n```\n\n> Markdown is awesome!";
    updatePreview();
}

function updatePreview() {
    preview.innerHTML = marked.parse(editor.value);
    localStorage.setItem('hub_markdown', editor.value);
}

function clearEditor() {
    if(confirm('Are you sure you want to clear?')) {
        editor.value = '';
        updatePreview();
    }
}

editor.addEventListener('input', updatePreview);

// Synchronize scrolling
editor.addEventListener('scroll', () => {
    const percentage = editor.scrollTop / (editor.scrollHeight - editor.clientHeight);
    preview.scrollTop = percentage * (preview.scrollHeight - preview.clientHeight);
});
</script>
</body>
</html>
