<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Quote Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f0f0f5;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.container{background:#16162a;padding:40px;border-radius:24px;width:100%;max-width:600px;box-shadow:0 20px 50px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.05);position:relative;overflow:hidden}
.container::before{content:'"';position:absolute;top:10px;left:20px;font-size:120px;color:rgba(255,255,255,0.03);font-family:serif;line-height:1}
.quote-text{font-size:28px;line-height:1.4;margin-bottom:20px;font-weight:600;min-height:120px;display:flex;align-items:center;position:relative;z-index:1}
.quote-author{text-align:right;font-size:18px;color:#a29bfe;font-style:italic;margin-bottom:40px}
.btn-container{display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(255,255,255,0.05);padding-top:20px}
.share-btn{background:none;border:none;color:#a0a0b8;font-size:24px;cursor:pointer;transition:color 0.2s}
.share-btn:hover{color:#fff}
.new-btn{padding:12px 24px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;transition:transform 0.2s}
.new-btn:hover{transform:translateY(-2px)}
.fade-in{animation:fade 0.5s}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="container">
    <div class="quote-text fade-in" id="quoteText">Loading quote...</div>
    <div class="quote-author fade-in" id="quoteAuthor">-</div>
    <div class="btn-container">
        <button class="share-btn" onclick="tweetQuote()" title="Tweet Quote">🐦</button>
        <button class="new-btn" onclick="getQuote()">New Quote</button>
    </div>
</div>

<script>
const quoteText = document.getElementById('quoteText');
const quoteAuthor = document.getElementById('quoteAuthor');

async function getQuote() {
    quoteText.classList.remove('fade-in');
    quoteAuthor.classList.remove('fade-in');
    
    // trigger reflow
    void quoteText.offsetWidth;
    
    try {
        const response = await fetch('https://api.quotable.io/random');
        const data = await response.json();
        
        quoteText.textContent = data.content;
        quoteAuthor.textContent = `- ${data.author}`;
        
        quoteText.classList.add('fade-in');
        quoteAuthor.classList.add('fade-in');
    } catch(err) {
        quoteText.textContent = "Oops! Could not fetch a quote. Please try again.";
        quoteAuthor.textContent = "";
    }
}

function tweetQuote() {
    const text = quoteText.textContent;
    const author = quoteAuthor.textContent;
    const twitterUrl = `https://twitter.com/intent/tweet?text=${text} ${author}`;
    window.open(twitterUrl, '_blank');
}

getQuote();
</script>
</body>
</html>
