<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Snippet Saver</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f0f0f5;display:flex;height:100vh}
.sidebar{width:300px;background:#12121a;border-right:1px solid rgba(255,255,255,0.05);display:flex;flex-direction:column}
.header{padding:20px;border-bottom:1px solid rgba(255,255,255,0.05)}
h1{font-size:18px;color:#a29bfe;margin-bottom:15px}
.add-btn{width:100%;padding:10px;background:#6c5ce7;color:#fff;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.add-btn:hover{background:#5a4bcf}
.snippet-list{flex:1;overflow-y:auto;padding:10px}
.snippet-item{padding:15px;background:#1a1a2e;border-radius:8px;margin-bottom:10px;cursor:pointer;border:1px solid transparent}
.snippet-item:hover{border-color:rgba(255,255,255,0.1)}
.snippet-item.active{border-color:#6c5ce7;background:#2a2a3e}
.snippet-title{font-weight:bold;margin-bottom:5px;font-size:14px}
.snippet-lang{font-size:11px;color:#a0a0b8;text-transform:uppercase}
.main{flex:1;display:flex;flex-direction:column;background:#0a0a0f;padding:20px}
.toolbar{display:flex;gap:15px;margin-bottom:20px}
input, select{padding:10px;background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;outline:none}
input{flex:1}
.action-btn{padding:10px 20px;background:#2a2a3e;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
.action-btn.delete{background:#ff7675;color:#1a1a2e}
textarea{flex:1;background:#12121a;border:1px solid rgba(255,255,255,0.05);border-radius:12px;color:#55efc4;font-family:monospace;font-size:14px;padding:20px;outline:none;resize:none}
</style>
</head>
<body>
<div class="sidebar">
    <div class="header">
        <h1>💾 Snippet Saver</h1>
        <button class="add-btn" onclick="createSnippet()">+ New Snippet</button>
    </div>
    <div class="snippet-list" id="list"></div>
</div>
<div class="main" id="editor" style="display:none">
    <div class="toolbar">
        <input type="text" id="sTitle" placeholder="Snippet Title" oninput="save()">
        <select id="sLang" onchange="save()">
            <option value="javascript">JavaScript</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="python">Python</option>
            <option value="plaintext">Plain Text</option>
        </select>
        <button class="action-btn" onclick="copyCode()">Copy</button>
        <button class="action-btn delete" onclick="deleteSnippet()">Delete</button>
    </div>
    <textarea id="sCode" placeholder="Paste your code here..." oninput="save()"></textarea>
</div>

<script>
let snippets = JSON.parse(localStorage.getItem('hub_snippets')) || [];
let activeId = null;

const listEl = document.getElementById('list');
const editorEl = document.getElementById('editor');
const titleEl = document.getElementById('sTitle');
const langEl = document.getElementById('sLang');
const codeEl = document.getElementById('sCode');

function saveToDb() { localStorage.setItem('hub_snippets', JSON.stringify(snippets)); }

function renderList() {
    listEl.innerHTML = '';
    snippets.forEach(s => {
        const div = document.createElement('div');
        div.className = `snippet-item ${s.id === activeId ? 'active' : ''}`;
        div.onclick = () => selectSnippet(s.id);
        div.innerHTML = `
            <div class="snippet-title">${s.title || 'Untitled'}</div>
            <div class="snippet-lang">${s.lang}</div>
        `;
        listEl.appendChild(div);
    });
}

function createSnippet() {
    const s = { id: Date.now(), title: '', lang: 'javascript', code: '' };
    snippets.unshift(s);
    saveToDb();
    selectSnippet(s.id);
}

function selectSnippet(id) {
    activeId = id;
    const s = snippets.find(x => x.id === id);
    if(s) {
        titleEl.value = s.title;
        langEl.value = s.lang;
        codeEl.value = s.code;
        editorEl.style.display = 'flex';
        renderList();
    }
}

function save() {
    if(!activeId) return;
    const s = snippets.find(x => x.id === activeId);
    if(s) {
        s.title = titleEl.value;
        s.lang = langEl.value;
        s.code = codeEl.value;
        saveToDb();
        renderList();
    }
}

function deleteSnippet() {
    if(!activeId || !confirm('Delete snippet?')) return;
    snippets = snippets.filter(x => x.id !== activeId);
    activeId = null;
    editorEl.style.display = 'none';
    saveToDb();
    renderList();
}

function copyCode() {
    navigator.clipboard.writeText(codeEl.value);
    alert('Copied to clipboard!');
}

renderList();
</script>
</body>
</html>
