<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algorithm Visualizer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f0f0f5;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
h1{margin-bottom:20px;background:linear-gradient(135deg,#00b894,#0984e3);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.controls{background:#16162a;padding:20px;border-radius:16px;border:1px solid rgba(255,255,255,0.05);display:flex;gap:15px;margin-bottom:30px;flex-wrap:wrap;justify-content:center}
button{padding:10px 20px;background:#1a1a2e;color:#fff;border:1px solid rgba(255,255,255,0.1);border-radius:8px;cursor:pointer;font-weight:bold;transition:all 0.2s}
button:hover{background:#2a2a3e}
button.primary{background:#00b894;color:#1a1a2e;border:none}
button.primary:hover{background:#00a383}
.visualizer{display:flex;align-items:flex-end;justify-content:center;height:400px;width:100%;max-width:800px;background:#12121a;border-radius:16px;border:1px solid rgba(255,255,255,0.05);padding:20px;gap:2px}
.bar{background:#0984e3;width:15px;border-radius:2px 2px 0 0;transition:height 0.1s, background 0.1s}
.bar.active{background:#ff7675}
.bar.sorted{background:#00b894}
</style>
</head>
<body>
    <h1>📊 Sorting Visualizer</h1>
    <div class="controls">
        <button onclick="generateArray()">Generate New Array</button>
        <button class="primary" onclick="bubbleSort()">Bubble Sort</button>
        <button class="primary" onclick="insertionSort()">Insertion Sort</button>
    </div>
    <div class="visualizer" id="visualizer"></div>

<script>
const container = document.getElementById('visualizer');
let array = [];
const arraySize = 40;

function generateArray() {
    array = [];
    container.innerHTML = '';
    for(let i=0; i<arraySize; i++) {
        const val = Math.floor(Math.random() * 350) + 10;
        array.push(val);
        const bar = document.createElement('div');
        bar.style.height = `${val}px`;
        bar.className = 'bar';
        container.appendChild(bar);
    }
}

const sleep = ms => new Promise(res => setTimeout(res, ms));

async function bubbleSort() {
    const bars = document.getElementsByClassName('bar');
    for(let i=0; i<array.length-1; i++) {
        for(let j=0; j<array.length-i-1; j++) {
            bars[j].classList.add('active');
            bars[j+1].classList.add('active');
            
            await sleep(50);
            
            if(array[j] > array[j+1]) {
                let temp = array[j];
                array[j] = array[j+1];
                array[j+1] = temp;
                
                bars[j].style.height = `${array[j]}px`;
                bars[j+1].style.height = `${array[j+1]}px`;
            }
            
            bars[j].classList.remove('active');
            bars[j+1].classList.remove('active');
        }
        bars[array.length-1-i].classList.add('sorted');
    }
    bars[0].classList.add('sorted');
}

async function insertionSort() {
    const bars = document.getElementsByClassName('bar');
    for(let i=1; i<array.length; i++) {
        let key = array[i];
        let j = i-1;
        
        bars[i].classList.add('active');
        await sleep(50);
        
        while(j >= 0 && array[j] > key) {
            bars[j].classList.add('active');
            array[j+1] = array[j];
            bars[j+1].style.height = `${array[j+1]}px`;
            await sleep(50);
            bars[j].classList.remove('active');
            j--;
        }
        array[j+1] = key;
        bars[j+1].style.height = `${key}px`;
        bars[i].classList.remove('active');
    }
    // Color all sorted
    for(let i=0; i<array.length; i++) {
        bars[i].classList.add('sorted');
        await sleep(20);
    }
}

generateArray();
</script>
</body>
</html>
