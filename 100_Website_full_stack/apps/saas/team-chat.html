<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Team Chat</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#0a0a14;color:#eee;height:100vh;display:flex;flex-direction:column}.header{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.08)}.header h1{font-size:18px}.badge{padding:3px 10px;background:rgba(124,92,255,.15);color:#7c5cff;border-radius:20px;font-size:10px;font-weight:600}.chat-area{flex:1;display:flex}.sidebar-ch{width:220px;background:#0d0d18;border-right:1px solid rgba(255,255,255,.08);padding:12px;overflow-y:auto}.channel{padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer;margin-bottom:4px;color:#888;transition:all .15s}.channel:hover{background:rgba(255,255,255,.05);color:#eee}.channel.active{background:rgba(124,92,255,.15);color:#7c5cff}.messages{flex:1;display:flex;flex-direction:column}.msg-list{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}.msg{display:flex;gap:10px;animation:fadeIn .3s}.msg-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}.msg-body{flex:1}.msg-name{font-size:12px;font-weight:600;margin-bottom:2px}.msg-text{font-size:13px;color:#ccc;line-height:1.5}.msg-time{font-size:10px;color:#555;margin-top:2px}.input-area{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:8px}.input-area input{flex:1;padding:10px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:#eee;font-family:inherit;font-size:13px;outline:none}.input-area input:focus{border-color:#7c5cff}.input-area button{padding:10px 20px;background:#7c5cff;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-family:inherit}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@media(max-width:600px){.sidebar-ch{display:none}}</style></head><body><div class="header"><span style="font-size:28px">ðŸ’¬</span><h1>Team Chat</h1><span class="badge">Real-Time SaaS</span></div><div class="chat-area"><div class="sidebar-ch"><div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;padding:8px 12px;font-weight:700">Channels</div><div class="channel active" onclick="switchChannel('general',this)"># general</div><div class="channel" onclick="switchChannel('random',this)"># random</div><div class="channel" onclick="switchChannel('dev',this)"># dev-team</div><div class="channel" onclick="switchChannel('design',this)"># design</div><div class="channel" onclick="switchChannel('announcements',this)"># announcements</div></div><div class="messages"><div class="msg-list" id="msgList"></div><div class="input-area"><input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off"><button onclick="sendMsg()">Send</button></div></div></div><script>const users=[{name:'Alice',color:'#7c5cff',avatar:'ðŸ‘©â€ðŸ’»'},{name:'Bob',color:'#10b981',avatar:'ðŸ‘¨â€ðŸ’¼'},{name:'Carol',color:'#f472b6',avatar:'ðŸ‘©â€ðŸŽ¨'},{name:'Dave',color:'#f59e0b',avatar:'ðŸ§‘â€ðŸ”§'}];const STORAGE='teamchat_msgs';let channels=JSON.parse(localStorage.getItem(STORAGE)||'{}');let currentCh='general';function save(){localStorage.setItem(STORAGE,JSON.stringify(channels))}function switchChannel(ch,el){currentCh=ch;document.querySelectorAll('.channel').forEach(c=>c.classList.remove('active'));el.classList.add('active');render()}function sendMsg(){const input=document.getElementById('msgInput');const text=input.value.trim();if(!text)return;if(!channels[currentCh])channels[currentCh]=[];channels[currentCh].push({user:{name:'You',color:'#7c5cff',avatar:'ðŸ™‚'},text,time:new Date().toLocaleTimeString()});save();render();input.value='';setTimeout(()=>{const u=users[Math.floor(Math.random()*users.length)];const replies=['Got it!','Makes sense ðŸ‘','I agree','Let me check...','On it!','Nice work! ðŸŽ‰','Can you elaborate?','Looks good to me'];channels[currentCh].push({user:u,text:replies[Math.floor(Math.random()*replies.length)],time:new Date().toLocaleTimeString()});save();render()},1000+Math.random()*2000)}document.getElementById('msgInput').addEventListener('keydown',e=>{if(e.key==='Enter')sendMsg()});function render(){const list=document.getElementById('msgList');const msgs=channels[currentCh]||[];list.innerHTML=msgs.length?msgs.map(m=>`<div class="msg"><div class="msg-avatar" style="background:${m.user.color}22">${m.user.avatar}</div><div class="msg-body"><div class="msg-name" style="color:${m.user.color}">${m.user.name}</div><div class="msg-text">${m.text}</div><div class="msg-time">${m.time}</div></div></div>`).join(''):'<div style="text-align:center;padding:60px;color:#555"><span style="font-size:48px;display:block;margin-bottom:12px">ðŸ’¬</span>No messages yet. Start the conversation!</div>';list.scrollTop=list.scrollHeight}render()</script></body></html>
