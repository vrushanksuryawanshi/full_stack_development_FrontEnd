<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a14;color:#eee;min-height:100vh;padding:24px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.08)}
.header h1{font-size:22px;font-weight:700;display:flex;align-items:center;gap:10px}
.badge{padding:4px 12px;background:rgba(124,92,255,.15);color:#7c5cff;border-radius:20px;font-size:11px;font-weight:600}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:#12122a;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:16px;text-align:center}
.stat .val{font-size:24px;font-weight:800;color:#7c5cff}
.stat .lbl{font-size:11px;color:#888;margin-top:4px;text-transform:uppercase}
.add-form{background:#12122a;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:20px;margin-bottom:20px}
.form-row{display:flex;gap:12px;margin-bottom:12px}
.form-row:last-child{margin-bottom:0}
input,select{flex:1;padding:10px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:#eee;font-family:inherit;font-size:13px;outline:none}
input:focus,select:focus{border-color:#7c5cff}
select option{background:#12122a}
.btn{padding:10px 20px;background:#7c5cff;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:transform .15s}
.btn:hover{transform:translateY(-2px)}
.btn-sm{padding:6px 12px;font-size:11px}
.btn-danger{background:#ef4444}
.btn-success{background:#10b981}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;color:#888;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s}
.filter-btn.active{background:rgba(124,92,255,.15);color:#7c5cff;border-color:#7c5cff}
.task-list{display:flex;flex-direction:column;gap:8px}
.task{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#12122a;border:1px solid rgba(255,255,255,.08);border-radius:10px;transition:all .2s}
.task:hover{border-color:rgba(255,255,255,.15);transform:translateX(4px)}
.task.done{opacity:.5}
.task.done .task-title{text-decoration:line-through}
.task input[type=checkbox]{width:18px;height:18px;accent-color:#7c5cff;cursor:pointer;flex-shrink:0}
.task-content{flex:1}
.task-title{font-size:14px;font-weight:600}
.task-meta{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap}
.task-meta span{font-size:11px;padding:2px 8px;border-radius:12px}
.priority-high{background:rgba(239,68,68,.15);color:#ef4444}
.priority-medium{background:rgba(245,158,11,.15);color:#f59e0b}
.priority-low{background:rgba(16,185,129,.15);color:#10b981}
.due-date{background:rgba(124,92,255,.1);color:#a78bfa}
.task-actions{display:flex;gap:6px}
.empty{text-align:center;padding:48px;color:#555}
.empty span{font-size:48px;display:block;margin-bottom:12px}
@media(max-width:600px){.stat-grid{grid-template-columns:1fr 1fr}.form-row{flex-direction:column}}
</style>
</head>
<body>
<div class="header">
    <h1>✅ Task Manager</h1>
    <span class="badge">Full-Stack SaaS</span>
</div>

<div class="stat-grid">
    <div class="stat"><div class="val" id="totalCount">0</div><div class="lbl">Total</div></div>
    <div class="stat"><div class="val" id="activeCount">0</div><div class="lbl">Active</div></div>
    <div class="stat"><div class="val" id="doneCount">0</div><div class="lbl">Completed</div></div>
    <div class="stat"><div class="val" id="overdueCount">0</div><div class="lbl">Overdue</div></div>
</div>

<div class="add-form">
    <div class="form-row">
        <input type="text" id="taskInput" placeholder="What needs to be done?">
        <select id="priorityInput">
            <option value="low">Low Priority</option>
            <option value="medium" selected>Medium Priority</option>
            <option value="high">High Priority</option>
        </select>
    </div>
    <div class="form-row">
        <input type="date" id="dueInput">
        <button class="btn" onclick="addTask()">+ Add Task</button>
    </div>
</div>

<div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('active',this)">Active</button>
    <button class="filter-btn" onclick="setFilter('done',this)">Completed</button>
    <button class="filter-btn" onclick="setFilter('high',this)">🔴 High</button>
    <button class="filter-btn" onclick="setFilter('overdue',this)">⚠️ Overdue</button>
</div>

<div class="task-list" id="taskList"></div>

<script>
const STORAGE='taskmanager_tasks';
let tasks=JSON.parse(localStorage.getItem(STORAGE)||'[]');
let filter='all';

function save(){localStorage.setItem(STORAGE,JSON.stringify(tasks))}

function addTask(){
    const title=document.getElementById('taskInput').value.trim();
    if(!title)return;
    tasks.push({id:Date.now(),title,priority:document.getElementById('priorityInput').value,due:document.getElementById('dueInput').value,done:false,created:new Date().toISOString()});
    document.getElementById('taskInput').value='';
    document.getElementById('dueInput').value='';
    save();render();
}

document.getElementById('taskInput').addEventListener('keydown',e=>{if(e.key==='Enter')addTask()});

function toggleTask(id){
    const t=tasks.find(t=>t.id===id);
    if(t)t.done=!t.done;
    save();render();
}

function deleteTask(id){
    tasks=tasks.filter(t=>t.id!==id);
    save();render();
}

function setFilter(f,btn){
    filter=f;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
}

function isOverdue(t){
    if(!t.due||t.done)return false;
    return new Date(t.due)<new Date(new Date().toDateString());
}

function render(){
    let filtered=tasks;
    if(filter==='active')filtered=tasks.filter(t=>!t.done);
    else if(filter==='done')filtered=tasks.filter(t=>t.done);
    else if(filter==='high')filtered=tasks.filter(t=>t.priority==='high'&&!t.done);
    else if(filter==='overdue')filtered=tasks.filter(t=>isOverdue(t));

    const list=document.getElementById('taskList');
    if(filtered.length===0){
        list.innerHTML='<div class="empty"><span>📋</span>No tasks found</div>';
    } else {
        list.innerHTML=filtered.map(t=>`
            <div class="task ${t.done?'done':''}">
                <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${t.id})">
                <div class="task-content">
                    <div class="task-title">${t.title}</div>
                    <div class="task-meta">
                        <span class="priority-${t.priority}">${t.priority}</span>
                        ${t.due?`<span class="due-date">${isOverdue(t)?'⚠️ ':''}${t.due}</span>`:''}
                    </div>
                </div>
                <div class="task-actions">
                    <button class="btn btn-sm btn-danger" onclick="deleteTask(${t.id})">✕</button>
                </div>
            </div>
        `).join('');
    }

    document.getElementById('totalCount').textContent=tasks.length;
    document.getElementById('activeCount').textContent=tasks.filter(t=>!t.done).length;
    document.getElementById('doneCount').textContent=tasks.filter(t=>t.done).length;
    document.getElementById('overdueCount').textContent=tasks.filter(t=>isOverdue(t)).length;
}

render();
</script>
</body>
</html>
