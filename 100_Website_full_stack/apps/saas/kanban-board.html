<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Kanban Board</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#0a0a14;color:#eee;min-height:100vh;padding:20px}.header{display:flex;align-items:center;gap:10px;margin-bottom:20px}.header h1{font-size:20px}.badge{padding:3px 10px;background:rgba(124,92,255,.15);color:#7c5cff;border-radius:20px;font-size:10px;font-weight:600}.board{display:flex;gap:16px;overflow-x:auto;padding-bottom:20px;min-height:70vh}.column{flex:0 0 280px;background:#0d0d18;border:1px solid rgba(255,255,255,.08);border-radius:12px;display:flex;flex-direction:column;max-height:80vh}.col-header{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between}.col-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}.col-count{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}.col-cards{flex:1;padding:12px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;min-height:100px}.card{background:#12122a;border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:12px;cursor:grab;transition:all .2s;position:relative}.card:hover{border-color:rgba(255,255,255,.15);transform:translateY(-2px)}.card-title{font-size:13px;font-weight:600;margin-bottom:6px}.card-desc{font-size:11px;color:#888;line-height:1.4;margin-bottom:8px}.card-footer{display:flex;justify-content:space-between;align-items:center}.card-tag{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600}.card-del{background:none;border:none;color:#555;cursor:pointer;font-size:14px;padding:2px}.card-del:hover{color:#ef4444}.add-card{padding:10px;border:1px dashed rgba(255,255,255,.1);border-radius:8px;text-align:center;font-size:12px;color:#555;cursor:pointer;transition:all .2s;background:none;width:100%;font-family:inherit}.add-card:hover{border-color:#7c5cff;color:#7c5cff}.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}.modal-bg.show{display:flex}.modal{background:#12122a;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:24px;width:90%;max-width:400px}.modal h3{margin-bottom:16px;font-size:16px}.modal input,.modal textarea{width:100%;padding:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:#eee;font-family:inherit;font-size:13px;outline:none;margin-bottom:12px}.modal textarea{min-height:80px;resize:vertical}.modal-btns{display:flex;gap:8px;justify-content:flex-end}.modal-btns button{padding:8px 16px;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-family:inherit;font-size:12px}.btn-primary{background:#7c5cff;color:#fff}.btn-cancel{background:rgba(255,255,255,.05);color:#888}</style></head><body><div class="header"><span style="font-size:28px">ðŸ“‹</span><h1>Kanban Board</h1><span class="badge">Project Management</span></div><div class="board" id="board"></div><div class="modal-bg" id="modal"><div class="modal"><h3 id="modalTitle">Add Card</h3><input type="text" id="cardTitle" placeholder="Card title"><textarea id="cardDesc" placeholder="Description (optional)"></textarea><div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="saveCard()">Add</button></div></div></div><script>const STORAGE='kanban_data';const defaultCols=[{id:'todo',title:'To Do',color:'#7c5cff',cards:[]},{id:'progress',title:'In Progress',color:'#f59e0b',cards:[]},{id:'review',title:'Review',color:'#06b6d4',cards:[]},{id:'done',title:'Done',color:'#10b981',cards:[]}];let columns=JSON.parse(localStorage.getItem(STORAGE))||JSON.parse(JSON.stringify(defaultCols));let addToCol=null;let dragCard=null;let dragFromCol=null;function save(){localStorage.setItem(STORAGE,JSON.stringify(columns))}function render(){const board=document.getElementById('board');board.innerHTML=columns.map(col=>`<div class="column" data-col="${col.id}" ondragover="event.preventDefault();this.style.background='#15152a'" ondragleave="this.style.background='#0d0d18'" ondrop="dropCard(event,'${col.id}');this.style.background='#0d0d18'"><div class="col-header"><span class="col-title">${col.title}</span><span class="col-count" style="background:${col.color}22;color:${col.color}">${col.cards.length}</span></div><div class="col-cards">${col.cards.map((c,i)=>`<div class="card" draggable="true" ondragstart="startDrag('${col.id}',${i})" style="border-left:3px solid ${col.color}"><div class="card-title">${c.title}</div>${c.desc?`<div class="card-desc">${c.desc}</div>`:''}<div class="card-footer"><span class="card-tag" style="background:${col.color}22;color:${col.color}">${col.title}</span><button class="card-del" onclick="delCard('${col.id}',${i})">âœ•</button></div></div>`).join('')}</div><button class="add-card" onclick="openModal('${col.id}')">+ Add Card</button></div>`).join('')}function openModal(colId){addToCol=colId;document.getElementById('modal').classList.add('show');document.getElementById('cardTitle').focus()}function closeModal(){document.getElementById('modal').classList.remove('show');document.getElementById('cardTitle').value='';document.getElementById('cardDesc').value=''}function saveCard(){const title=document.getElementById('cardTitle').value.trim();if(!title)return;const col=columns.find(c=>c.id===addToCol);col.cards.push({title,desc:document.getElementById('cardDesc').value.trim()});save();render();closeModal()}function delCard(colId,idx){columns.find(c=>c.id===colId).cards.splice(idx,1);save();render()}function startDrag(colId,idx){dragFromCol=colId;dragCard=idx}function dropCard(e,toColId){e.preventDefault();if(dragFromCol===null)return;const from=columns.find(c=>c.id===dragFromCol);const to=columns.find(c=>c.id===toColId);const card=from.cards.splice(dragCard,1)[0];to.cards.push(card);dragFromCol=null;dragCard=null;save();render()}document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});render()</script></body></html>
