<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Bookmark Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#0a0a14;color:#eee;min-height:100vh;padding:24px}
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.08)}.hdr h1{font-size:20px;font-weight:700}.hdr .ico{font-size:28px}
.bdg{padding:3px 10px;background:#7c5cff22;color:#7c5cff;border-radius:20px;font-size:10px;font-weight:600}
.crd{background:#12122a;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:20px;margin-bottom:16px;transition:border-color .2s}.crd:hover{border-color:rgba(255,255,255,.15)}
.crd h3{font-size:15px;margin-bottom:8px;color:#7c5cff}.crd p{font-size:13px;color:#888;line-height:1.6}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:#7c5cff;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:transform .15s}.btn:hover{transform:translateY(-2px)}
.btn-o{background:transparent;border:1px solid rgba(255,255,255,.08);color:#aaa}.btn-o:hover{border-color:#7c5cff;color:#7c5cff}
.btn-d{background:#ef4444}.btn-sm{padding:6px 12px;font-size:11px}
input,textarea,select{width:100%;padding:10px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:#eee;font-family:inherit;font-size:13px;outline:none;margin-bottom:12px}
input:focus,textarea:focus,select:focus{border-color:#7c5cff}textarea{resize:vertical;min-height:80px}select option{background:#12122a}
label{display:block;font-size:11px;font-weight:600;color:#666;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.fg{margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.sb{background:#12122a;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px;text-align:center}
.sb .v{font-size:22px;font-weight:800;color:#7c5cff}.sb .l{font-size:10px;color:#666;margin-top:4px;text-transform:uppercase}
.li{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#12122a;border:1px solid rgba(255,255,255,.08);border-radius:10px;margin-bottom:8px;transition:all .2s}.li:hover{border-color:rgba(255,255,255,.15);transform:translateX(4px)}
.li .ic{width:36px;height:36px;border-radius:8px;background:#7c5cff15;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.li .ct{flex:1}.li .tt{font-size:13px;font-weight:600}.li .st{font-size:11px;color:#666;margin-top:2px}
.tabs{display:flex;gap:4px;background:rgba(255,255,255,.03);border-radius:10px;padding:4px;margin-bottom:20px}
.tab{flex:1;padding:8px;text-align:center;border-radius:8px;font-size:12px;font-weight:600;color:#666;cursor:pointer;border:none;background:none;font-family:inherit;transition:all .2s}
.tab.on{background:#7c5cff;color:#fff}.tab:hover:not(.on){color:#eee;background:rgba(255,255,255,.05)}
.pb{height:8px;background:rgba(255,255,255,.08);border-radius:8px;overflow:hidden;margin-top:6px}.pf{height:100%;background:#7c5cff;border-radius:8px;transition:width .5s}
.tbl{width:100%;border-collapse:collapse;font-size:13px}.tbl th,.tbl td{padding:10px 14px;text-align:left;border-bottom:1px solid rgba(255,255,255,.06)}.tbl th{font-size:10px;text-transform:uppercase;color:#666;letter-spacing:.5px}
.tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;background:#7c5cff18;color:#7c5cff;margin-right:4px}
.empty{text-align:center;padding:48px;color:#444}.empty span{font-size:48px;display:block;margin-bottom:12px}
.flex{display:flex;gap:12px;align-items:center}.flexb{display:flex;justify-content:space-between;align-items:center}
.mt{margin-top:16px}.mb{margin-bottom:16px}
.del{background:none;border:none;color:#555;cursor:pointer;font-size:14px;padding:2px}.del:hover{color:#ef4444}
@media(max-width:600px){.g2,.g3{grid-template-columns:1fr}.sg{grid-template-columns:1fr 1fr}}
</style></head><body>
<div class="hdr"><span class="ico">🔖</span><h1>Bookmark Manager</h1><span class="bdg">Full-Stack App</span></div>
<div class="crd"><div class="g2"><input id="bn" placeholder="Bookmark name"><input id="bu" placeholder="https://..."></div><div class="g2"><select id="bc"><option>General</option><option>Dev</option><option>Design</option><option>News</option><option>Learning</option></select><button class="btn" onclick="addBm()">+ Save</button></div></div><div class="tabs" id="btabs"></div><div id="blist"></div>
<script>const K="bookmarks";let bms=JSON.parse(localStorage.getItem(K)||"[]");let bfilter="All";function save(){localStorage.setItem(K,JSON.stringify(bms))}function addBm(){const n=document.getElementById("bn").value.trim(),u=document.getElementById("bu").value.trim();if(!n||!u)return;bms.push({id:Date.now(),name:n,url:u,cat:document.getElementById("bc").value});document.getElementById("bn").value="";document.getElementById("bu").value="";save();render()}function del(id){bms=bms.filter(b=>b.id!==id);save();render()}function setF(f,btn){bfilter=f;document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));btn.classList.add("on");render()}function render(){const cats=["All",...new Set(bms.map(b=>b.cat))];document.getElementById("btabs").innerHTML=cats.map(c=>`<button class="tab ${c===bfilter?"on":""}" onclick="setF('${c}',this)">${c}</button>`).join("");const filtered=bfilter==="All"?bms:bms.filter(b=>b.cat===bfilter);document.getElementById("blist").innerHTML=filtered.map(b=>`<div class="li"><div class="ic">🔗</div><div class="ct"><div class="tt">${b.name}</div><div class="st">${b.url}</div></div><span class="tag">${b.cat}</span><a href="${b.url}" target="_blank" style="color:#7c5cff;text-decoration:none;font-size:12px">Open ↗</a><button class="del" onclick="del(${b.id})">✕</button></div>`).join("")||'<div class="empty"><span>🔖</span>No bookmarks saved</div>'}render()</script>
</body></html>
