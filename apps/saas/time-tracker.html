<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Time Tracker</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#0a0a14;color:#eee;min-height:100vh;padding:24px}.header{display:flex;align-items:center;gap:10px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.08)}.header h1{font-size:22px}.badge{padding:3px 10px;background:rgba(124,92,255,.15);color:#7c5cff;border-radius:20px;font-size:10px;font-weight:600}.timer-display{text-align:center;padding:40px;background:#12122a;border:1px solid rgba(255,255,255,.08);border-radius:16px;margin-bottom:24px}.timer-time{font-size:56px;font-weight:800;color:#7c5cff;font-variant-numeric:tabular-nums;letter-spacing:2px}.timer-project{font-size:14px;color:#888;margin-top:8px}.timer-controls{display:flex;justify-content:center;gap:12px;margin-top:20px}.timer-controls button{padding:12px 28px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .15s}.timer-controls button:hover{transform:translateY(-2px)}.btn-start{background:#10b981;color:#fff}.btn-stop{background:#ef4444;color:#fff}.btn-reset{background:rgba(255,255,255,.1);color:#888}.project-input{display:flex;gap:12px;margin-bottom:24px}.project-input input{flex:1;padding:12px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#eee;font-family:inherit;font-size:14px;outline:none}.project-input input:focus{border-color:#7c5cff}.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}.stat{background:#12122a;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:16px;text-align:center}.stat .val{font-size:20px;font-weight:800;color:#7c5cff}.stat .lbl{font-size:11px;color:#888;margin-top:4px;text-transform:uppercase}.entries h3{font-size:14px;color:#888;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}.entry{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#12122a;border:1px solid rgba(255,255,255,.08);border-radius:10px;margin-bottom:8px}.entry-project{flex:1;font-size:14px;font-weight:600}.entry-duration{font-size:14px;color:#7c5cff;font-weight:700;font-variant-numeric:tabular-nums}.entry-date{font-size:11px;color:#555}.entry-del{background:none;border:none;color:#555;cursor:pointer;font-size:14px}.entry-del:hover{color:#ef4444}@media(max-width:600px){.stat-grid{grid-template-columns:1fr}.timer-time{font-size:40px}}</style></head><body><div class="header"><span style="font-size:28px">â±ï¸</span><h1>Time Tracker</h1><span class="badge">SaaS</span></div><div class="project-input"><input type="text" id="projectInput" placeholder="What are you working on?" value=""></div><div class="timer-display"><div class="timer-time" id="timerDisplay">00:00:00</div><div class="timer-project" id="timerProject">Not tracking</div><div class="timer-controls"><button class="btn-start" id="startBtn" onclick="startTimer()">â–¶ Start</button><button class="btn-stop" id="stopBtn" onclick="stopTimer()" style="display:none">â¹ Stop</button><button class="btn-reset" onclick="resetTimer()">â†º Reset</button></div></div><div class="stat-grid"><div class="stat"><div class="val" id="todayTime">0h 0m</div><div class="lbl">Today</div></div><div class="stat"><div class="val" id="totalEntries">0</div><div class="lbl">Entries</div></div><div class="stat"><div class="val" id="totalTime">0h 0m</div><div class="lbl">All Time</div></div></div><div class="entries"><h3>Time Log</h3><div id="entryList"></div></div><script>const STORAGE='timetracker_data';let entries=JSON.parse(localStorage.getItem(STORAGE)||'[]');let timer=null,seconds=0,running=false;function save(){localStorage.setItem(STORAGE,JSON.stringify(entries))}function pad(n){return String(n).padStart(2,'0')}function formatTime(s){return`${pad(Math.floor(s/3600))}:${pad(Math.floor(s%3600/60))}:${pad(s%60)}`}function formatHM(s){const h=Math.floor(s/3600),m=Math.floor(s%3600/60);return`${h}h ${m}m`}function startTimer(){running=true;document.getElementById('startBtn').style.display='none';document.getElementById('stopBtn').style.display='';const proj=document.getElementById('projectInput').value||'Untitled';document.getElementById('timerProject').textContent=proj;timer=setInterval(()=>{seconds++;document.getElementById('timerDisplay').textContent=formatTime(seconds)},1000)}function stopTimer(){running=false;clearInterval(timer);document.getElementById('startBtn').style.display='';document.getElementById('stopBtn').style.display='none';if(seconds>0){entries.unshift({project:document.getElementById('projectInput').value||'Untitled',duration:seconds,date:new Date().toLocaleDateString()});save()}seconds=0;document.getElementById('timerDisplay').textContent='00:00:00';document.getElementById('timerProject').textContent='Not tracking';render()}function resetTimer(){clearInterval(timer);running=false;seconds=0;document.getElementById('timerDisplay').textContent='00:00:00';document.getElementById('timerProject').textContent='Not tracking';document.getElementById('startBtn').style.display='';document.getElementById('stopBtn').style.display='none'}function delEntry(i){entries.splice(i,1);save();render()}function render(){const list=document.getElementById('entryList');list.innerHTML=entries.length?entries.map((e,i)=>`<div class="entry"><div class="entry-project">${e.project}</div><div class="entry-duration">${formatTime(e.duration)}</div><div class="entry-date">${e.date}</div><button class="entry-del" onclick="delEntry(${i})">âœ•</button></div>`).join(''):'<div style="text-align:center;padding:32px;color:#555">No entries yet</div>';const total=entries.reduce((s,e)=>s+e.duration,0);document.getElementById('totalTime').textContent=formatHM(total);document.getElementById('totalEntries').textContent=entries.length;const today=new Date().toLocaleDateString();const todayTotal=entries.filter(e=>e.date===today).reduce((s,e)=>s+e.duration,0);document.getElementById('todayTime').textContent=formatHM(todayTotal)}render()</script></body></html>
